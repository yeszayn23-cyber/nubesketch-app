<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>اللعبة الإيمانية</title>
    <!-- إضافة الخطوط لجمالية إسلامية -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --bg: #f5e6d3; }
        body { background-color: var(--bg); font-family: 'Amiri', serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { background: #fff; padding: 30px; border-radius: 20px; border: 3px double var(--gold); text-align: center; width: 85%; max-width: 400px; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid var(--gold); border-radius: 8px; }
        button { background: var(--gold); color: white; cursor: pointer; font-weight: bold; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; color: white; }
    </style>
</head>
<body>

    <div class="container">
        <h1>الله أولاً</h1>
        <input type="text" id="names" placeholder="الأسماء (سارة / مريم / زينب)">
        <input type="text" id="targets" placeholder="أسماء الله المتاحة (اللطيف / الهادي / البصير)">
        <button onclick="startGame()">بدء التدبر</button>
    </div>

    <div id="overlay">
        <div id="turn-msg" style="font-size: 20px;"></div>
        <div style="font-size: 80px; cursor: pointer;" onclick="openEnv()">📂</div>
        <div id="role-msg" style="display:none; font-size: 32px; color: var(--gold);">---</div>
        <button id="closeBtn" style="display:none; width: 50%;" onclick="next()">تم (إغلاق)</button>
    </div>

    <script>
        let roles = [], currentIndex = 0;

        function startGame() {
            let names = document.getElementById('names').value.split('/').map(n => n.trim());
            let targets = document.getElementById('targets').value.split('/').map(n => n.trim());
            
            // البوت يختار اسماً عشوائياً من القائمة
            let chosenTarget = targets[Math.floor(Math.random() * targets.length)];
            let spyIdx = Math.floor(Math.random() * names.length);
            
            roles = names.map((n, i) => ({ name: n, role: (i === spyIdx ? "أنتِ المتأملة (الدخيلة)" : chosenTarget) }));
            currentIndex = 0;
            next();
        }

        function next() {
            if(currentIndex < roles.length) {
                document.getElementById('turn-msg').innerText = "أعطي الهاتف لـ: " + roles[currentIndex].name;
                document.getElementById('role-msg').style.display = "none";
                document.getElementById('closeBtn').style.display = "none";
                document.getElementById('overlay').style.display = "flex";
            } else {
                alert("انتهت الجولة.");
                document.getElementById('overlay').style.display = "none";
            }
        }

        function openEnv() {
            document.getElementById('role-msg').innerText = roles[currentIndex].role;
            document.getElementById('role-msg').style.display = "block";
            document.getElementById('closeBtn').style.display = "block";
            currentIndex++;
        }
    </script>
</body>
</html>
