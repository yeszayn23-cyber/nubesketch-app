<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Professional Paint Engine</title>
    <style>
        :root { --panel: #1e1e1e; --border: #333; --accent: #007acc; }
        body { margin: 0; display: flex; height: 100vh; background: #121212; color: #ddd; font-family: sans-serif; }
        
        /* شريط الأدوات الرئيسي (دقة متناهية) */
        #toolbar { width: 60px; background: var(--panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; align-items: center; padding-top: 10px; }
        .icon { width: 40px; height: 40px; background: #2a2a2a; border-radius: 4px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .icon:hover { background: var(--accent); }

        /* منطقة الرسم */
        #canvas-area { flex: 1; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        canvas { background: white; box-shadow: 0 0 20px rgba(0,0,0,0.5); }

        /* اللوحة اليمنى (المكتبة) */
        #right-sidebar { width: 300px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .tab-content { padding: 15px; display: none; }
        .tab-content.active { display: block; }
        
        /* تفاصيل الفرش المتقدمة */
        .brush-preview { width: 100%; height: 60px; background: #2a2a2a; margin-bottom: 10px; cursor: pointer; border: 1px solid var(--border); display: flex; align-items: center; padding: 0 10px; }
        
        /* منزلقات التحكم (RGB و Opacity) */
        input[type="range"] { width: 100%; accent-color: var(--accent); margin: 10px 0; }
    </style>
</head>
<body>

<div id="toolbar">
    <div class="icon" onclick="setTool('brush')">🖌️</div>
    <div class="icon" onclick="setTool('eraser')">🧽</div>
    <div class="icon" onclick="setTool('smudge')">👈</div>
</div>

<div id="canvas-area">
    <canvas id="mainCanvas" width="800" height="600"></canvas>
</div>

<div id="right-sidebar">
    <div style="display: flex;">
        <button onclick="openTab('brushes')">الفرش</button>
        <button onclick="openTab('colors')">الألوان</button>
        <button onclick="openTab('layers')">الطبقات</button>
    </div>
    
    <div id="brushes" class="tab-content active">
        <div class="brush-preview" onclick="selectBrush('watercolor')">مائي (Water Paint)</div>
        <div class="brush-preview" onclick="selectBrush('charcoal')">فحم (Charcoal)</div>
        <div class="brush-preview" onclick="selectBrush('hair')">شعر (Hair)</div>
    </div>

    <div id="colors" class="tab-content">
        <label>RGB Controls</label>
        <input type="range" id="red" max="255">
        <input type="range" id="green" max="255">
        <input type="range" id="blue" max="255">
        <div id="colorPreview" style="height: 40px; background: black;"></div>
    </div>
</div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    let currentTool = 'brush';
    let currentBrush = 'watercolor';
    let isDrawing = false;

    // دالة محرك الرسم المتطور
    function draw(e) {
        if (!isDrawing) return;
        ctx.lineWidth = 15;
        ctx.lineCap = 'round';
        
        // هنا يتم دمج المنطق الخاص بنوع الفرشاة (مائي/فحم/شعر)
        if (currentBrush === 'watercolor') {
            ctx.globalAlpha = 0.1; // شفافية للمزج المائي
            ctx.strokeStyle = `rgb(${document.getElementById('red').value}, ${document.getElementById('green').value}, ${document.getElementById('blue').value})`;
        } else if (currentBrush === 'charcoal') {
            ctx.globalCompositeOperation = 'source-over';
            ctx.globalAlpha = 1;
        }
        
        ctx.lineTo(e.offsetX, e.offsetY);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(e.offsetX, e.offsetY);
    }

    canvas.addEventListener('mousedown', (e) => { isDrawing = true; ctx.beginPath(); });
    canvas.addEventListener('mouseup', () => { isDrawing = false; });
    canvas.addEventListener('mousemove', draw);

    function openTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }
    
    function selectBrush(type) { currentBrush = type; }
</script>

</body>
</html>
