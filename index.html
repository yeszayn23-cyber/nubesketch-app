<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>إستوديو الرسم الاحترافي اللمسي</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; user-select: none; -webkit-user-select: none; }
        body { background: #1e1e24; color: #ffffff; display: flex; flex-direction: column; height: 100vh; overflow: hidden; fixed: position; }
        
        /* شريط علوي ذكي ونظيف */
        .top-bar { height: 50px; background: #141419; display: flex; justify-content: space-between; align-items: center; padding: 0 16px; border-bottom: 1px solid #2d2d35; z-index: 100; }
        .brand { font-weight: bold; font-size: 15px; color: #e5e5e5; }
        .brand span { color: #38bdf8; }
        .top-actions { display: flex; gap: 10px; }

        /* مساحة العمل الكبرى التي تحتضن حركة الكانفاس باللمس */
        .workspace { flex: 1; position: relative; background: #3a3a42; overflow: hidden; display: flex; justify-content: center; align-items: center; touch-action: none; }
        
        /* حاوية تحويل الكانفاس المرنة بالإصبعين */
        .canvas-transform-viewport { position: absolute; transform-origin: center center; display: flex; justify-content: center; align-items: center; pointer-events: none; }
        .canvas-container { position: relative; background: #ffffff; box-shadow: 0 10px 30px rgba(0,0,0,0.5); pointer-events: auto; }
        .canvas-container canvas { position: absolute; top: 0; left: 0; display: block; width: 100%; height: 100%; }

        /* شريط الأدوات السفلي المستوحى من التطبيقات العالمية */
        .bottom-bar { height: 60px; background: #141419; border-top: 1px solid #2d2d35; display: flex; justify-content: space-around; align-items: center; z-index: 110; padding-bottom: env(safe-area-inset-bottom); }
        .bottom-btn { background: none; border: none; color: #a3a3c2; width: 50px; height: 50px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; gap: 4px; cursor: pointer; }
        .bottom-btn.active { color: #38bdf8; }
        .bottom-btn svg { width: 22px; height: 22px; fill: currentColor; }

        /* قائمة الأدوات المنبثقة الرأسية المطابقة تماماً للصورة الثالثة المرفقة */
        .tools-popup-panel { position: absolute; bottom: 70px; left: 16px; background: rgba(30, 30, 36, 0.95); backdrop-filter: blur(10px); border: 1px solid #4a4a5a; border-radius: 14px; width: 140px; display: none; flex-direction: column; padding: 6px; z-index: 150; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
        .tools-popup-panel.show { display: flex; }
        .tool-row { display: flex; align-items: center; gap: 12px; width: 100%; padding: 10px 12px; background: none; border: none; color: #ffffff; text-align: right; font-size: 13px; font-weight: 500; border-radius: 8px; cursor: pointer; }
        .tool-row:hover, .tool-row.active { background: #2d2d35; color: #38bdf8; }
        .tool-row svg { width: 18px; height: 18px; fill: currentColor; }

        /* لوحة الألوان الاحترافية الدائرية مع المربع الماسي الداخلي المماثل للصورة الثانية */
        .color-panel { position: absolute; bottom: 70px; left: 50%; transform: translateX(-50%); background: #141419; border: 1px solid #2d2d35; border-radius: 16px; padding: 16px; width: 280px; display: none; flex-direction: column; align-items: center; gap: 12px; z-index: 140; box-shadow: 0 12px 36px rgba(0,0,0,0.6); }
        .color-panel.show { display: flex; }
        .color-panel-header { font-size: 14px; font-weight: bold; width: 100%; text-align: center; color: #a3a3c2; border-bottom: 1px solid #2d2d35; padding-bottom: 8px; }
        
        /* هيكل مساحة التقاط الألوان المتقدم */
        .wheel-container { position: relative; width: 200px; height: 200px; margin: 10px 0; touch-action: none; }
        #hueCanvas { position: absolute; top: 0; left: 0; border-radius: 50%; z-index: 1; }
        #slCanvas { position: absolute; top: 35px; left: 35px; z-index: 2; cursor: crosshair; }
        
        /* المؤشرات الصغيرة على حلقة الألوان والمربع */
        .wheel-picker { position: absolute; width: 12px; height: 12px; border: 2px solid #ffffff; border-radius: 50%; box-shadow: 0 0 4px rgba(0,0,0,0.8); pointer-events: none; z-index: 10; transform: translate(-50%, -50%); }

        .color-preview-row { display: flex; width: 100%; items: center; gap: 12px; background: #1e1e24; padding: 8px; border-radius: 8px; }
        .color-box { width: 45px; height: 35px; border-radius: 6px; border: 1px solid #4a4a5a; }
        .color-hex-text { font-family: monospace; font-size: 14px; color: #38bdf8; display: flex; align-items: center; }

        /* منزلقات التحكم الحية بسماكة وشفافية الفرشاة المدمجة أسفل الشاشة */
        .sliders-overlay { position: absolute; bottom: 12px; right: 16px; left: 80px; display: flex; flex-direction: column; gap: 8px; z-index: 95; background: rgba(20,20,25,0.8); padding: 8px 12px; border-radius: 10px; backdrop-filter: blur(5px); border: 1px solid #2d2d35; }
        .slider-item { display: flex; align-items: center; gap: 10px; width: 100%; }
        .slider-item span { font-size: 11px; color: #a3a3c2; font-weight: bold; width: 35px; }
        .slider-item input { flex: 1; accent-color: #38bdf8; height: 5px; cursor: pointer; }

        /* أزرار علوية هندسية ناصعة للتراجع والإعادة والمحو */
        .icon-btn { background: #141419; border: 1px solid #2d2d35; color: #ffffff; width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .icon-btn:disabled { opacity: 0.25; cursor: not-allowed; }
        .icon-btn svg { width: 16px; height: 16px; fill: currentColor; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="brand">إستوديو <span>الرسم المرن</span></div>
        <div class="top-actions">
            <button class="icon-btn" id="undoBtn" title="تراجع">
                <svg viewBox="0 0 24 24"><path d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/></svg>
            </button>
            <button class="icon-btn" id="redoBtn" title="إعادة">
                <svg viewBox="0 0 24 24"><path d="M18.4 10.6C16.55 8.99 14.15 8 11.5 8c-4.65 0-8.58 3.03-9.96 7.22L3.92 16c1.05-3.19 4.06-5.5 7.58-5.5 1.96 0 3.73.72 5.12 1.88L13 16h9V7l-3.6 3.6z"/></svg>
            </button>
            <button class="icon-btn" id="clearBtn" style="color: #ef4444;" title="مسح اللوحة">
                <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
            </button>
        </div>
    </div>

    <div class="workspace" id="workspace">
        <div class="canvas-transform-viewport" id="transformViewport">
            <div class="canvas-container" id="canvasContainer">
                <canvas id="paintCanvas"></canvas>
            </div>
        </div>

        <div class="sliders-overlay">
            <div class="slider-item">
                <span>الحجم</span>
                <input type="range" id="brushSize" min="1" max="100" value="8">
            </div>
            <div class="slider-item">
                <span>العتامة</span>
                <input type="range" id="brushOpacity" min="1" max="100" value="100">
            </div>
        </div>

        <div class="tools-popup-panel" id="toolsPopup">
            <button class="tool-row active" data-tool="brush">
                <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                <span>فرشاة رسم</span>
            </button>
            <button class="tool-row" data-tool="eraser">
                <svg viewBox="0 0 24 24"><path d="M15.14 3c-.51 0-1.02.2-1.41.59L2.59 14.73c-.78.78-.78 2.05 0 2.83L5.03 20h7.66l7.72-7.72c.78-.78.78-2.05 0-2.83l-3.86-3.86c-.39-.39-.9-.59-1.41-.59zM17 18l-3 3h7v-3h-4z"/></svg>
                <span>ممحاة</span>
            </button>
            <button class="tool-row" data-tool="bucket">
                <svg viewBox="0 0 24 24"><path d="M12 22c5.52 0 10-4.48 10-10S17.52 2 12 2 2 6.48 2 12s4.48 10 10 10zm0-18c3.31 0 6 2.69 6 6 0 3.31-2.69 6-6 6s-6-2.69-6-6c0-3.31 2.69-6 6-6z"/></svg>
                <span>دلو التعبئة</span>
            </button>
            <button class="tool-row" data-tool="picker">
                <svg viewBox="0 0 24 24"><path d="M17.71 6.15l-1.86-1.86c-.39-.39-1.02-.39-1.41 0L11.58 7.15l1.86 1.86 2.86-2.86zm-7.57 3.14L3 16.42V21h4.58l7.13-7.13-4.57-4.58z"/></svg>
                <span>التقاط لون</span>
            </button>
        </div>

        <div class="color-panel" id="colorPanel">
            <div class="color-panel-header">منتقي الألوان الاحترافي</div>
            <div class="wheel-container">
                <canvas id="hueCanvas" width="200" height="200"></canvas>
                <canvas id="slCanvas" width="130" height="130"></canvas>
                <div class="wheel-picker" id="huePicker"></div>
                <div class="wheel-picker" id="slPicker"></div>
            </div>
            <div class="color-preview-row">
                <div class="color-box" id="colorBoxPreview"></div>
                <div class="color-hex-text" id="colorHexText">#38bdf8</div>
            </div>
        </div>
    </div>

    <div class="bottom-bar">
        <button class="bottom-btn" id="toggleToolsBtn">
            <svg viewBox="0 0 24 24"><path d="M7 14c-1.66 0-3 1.34-3 3 0 1.31-1.16 2-2 2 .92.78 2.4 1 3 1 2.21 0 4-1.79 4-4 0-1.66-1.34-3-3-3zm13.71-9.37l-1.34-1.34c-.39-.39-1.02-.39-1.41 0L9 12.25 11.75 15l8.96-8.96c.39-.39.39-1.02 0-1.41z"/></svg>
            <span>الأدوات</span>
        </button>
        <button class="bottom-btn" id="toggleColorBtn">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.49 2 2 6.49 2 12s4.49 10 10 10 10-4.49 10-10S17.51 2 12 2zm6 10c0 .55-.45 1-1 1h-4v4c0 .55-.45 1-1 1s-1-.45-1-1v-4H7c-.55 0-1-.45-1-1s.45-1 1-1h4V7c0-.55-.45-1 1-1s1 .45 1 1v4h4c0 .55./45 1 1 1z"/></svg>
            <span>الألوان</span>
        </button>
    </div>

    <script>
        const workspace = document.getElementById('workspace');
        const transformViewport = document.getElementById('transformViewport');
        const canvasContainer = document.getElementById('canvasContainer');
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        // إعداد أبعاد ثابتة وفائقة الدقة للوحة الرسم الأساسية والـ HD Scaling لمنع بهتان حواف الخطوط
        const targetWidth = 800;
        const targetHeight = 800;
        const dpr = window.devicePixelRatio || 2;

        canvasContainer.style.width = targetWidth + 'px';
        canvasContainer.style.height = targetHeight + 'px';
        canvas.width = targetWidth * dpr;
        canvas.height = targetHeight * dpr;
        ctx.scale(dpr, dpr);

        // تعبئة خلفية الكanvas باللون الأبيض الأساسي للرسم نظيفاً
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, targetWidth, targetHeight);

        // متغيرات التحكم الديناميكي باللوحة (التقريب، الإبعاد والتدوير عبر اللمس بالإصبعين)
        let viewScale = 1.0;
        let viewRotation = 0;
        let viewPosX = 0;
        let viewPosY = 0;

        let activeTool = 'brush';
        let isPainting = false;
        let points = [];
        let selectedColor = '#38bdf8';

        // محرك حفظ حالات التراجع والإعادة (History Engine)
        let undoStack = [];
        let redoStack = [];
        const maxStates = 15;

        function saveCanvasState() {
            if (undoStack.length >= maxStates) undoStack.shift();
            undoStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
            redoStack = [];
            updateUndoRedoButtons();
        }

        function updateUndoRedoButtons() {
            document.getElementById('undoBtn').disabled = undoStack.length === 0;
            document.getElementById('redoBtn').disabled = redoStack.length === 0;
        }

        document.getElementById('undoBtn').addEventListener('click', () => {
            if (undoStack.length > 0) {
                redoStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
                const state = undoStack.pop();
                ctx.putImageData(state, 0, 0);
                updateUndoRedoButtons();
            }
        });

        document.getElementById('redoBtn').addEventListener('click', () => {
            if (redoStack.length > 0) {
                undoStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
                const state = redoStack.pop();
                ctx.putImageData(state, 0, 0);
                updateUndoRedoButtons();
            }
        });

        document.getElementById('clearBtn').addEventListener('click', () => {
            saveCanvasState();
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, targetWidth, targetHeight);
        });

        function applyViewportTransform() {
            transformViewport.style.transform = `translate(${viewPosX}px, ${viewPosY}px) scale(${viewScale}) rotate(${viewRotation}deg)`;
        }
        applyViewportTransform();

        // 📱 خوارزمية استشعار اللمس المتعدد المتقدمة للإصبعين (Pinch to Zoom, Pan & Rotate Canvas)
        let touchStartDist = 0;
        let touchStartAngle = 0;
        let touchStartScale = 1;
        let touchStartRotation = 0;
        let isMultiTouch = false;

        workspace.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                isMultiTouch = true;
                isPainting = false; // إلغاء الرسم فوراً عند رصد إصبع ثانٍ للتحكم بالشاشة
                points = [];
                
                const t1 = e.touches[0];
                const t2 = e.touches[1];
                
                // حساب المسافة البدائية للتقريب والإبعاد
                touchStartDist = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
                // حساب زاوية الميلان البدائية لتدوير الكانفاس بالإصبعين مرناً
                touchStartAngle = Math.atan2(t2.clientY - t1.clientY, t2.clientX - t1.clientX) * 135 / Math.PI;
                
                touchStartScale = viewScale;
                touchStartRotation = viewRotation;
            } else if (e.touches.length === 1 && !isMultiTouch) {
                handlePaintStart(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, { passive: false });

        workspace.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2 && isMultiTouch) {
                e.preventDefault();
                const t1 = e.touches[0];
                const t2 = e.touches[1];
                
                // حساب التغيير الفعلي للمسافة (التكبير/التصغير)
                const currentDist = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
                const scaleRatio = currentDist / touchStartDist;
                viewScale = Math.max(0.3, Math.min(6.0, touchStartScale * scaleRatio));

                // حساب تدوير الشاشة بدقة متناهية ودائرية بالكامل
                const currentAngle = Math.atan2(t2.clientY - t1.clientY, t2.clientX - t1.clientX) * 135 / Math.PI;
                const angleDiff = currentAngle - touchStartAngle;
                viewRotation = touchStartRotation + angleDiff;

                applyViewportTransform();
            } else if (e.touches.length === 1 && !isMultiTouch && isPainting) {
                e.preventDefault();
                handlePaintMove(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, { passive: false });

        workspace.addEventListener('touchend', (e) => {
            if (e.touches.length < 2) {
                isMultiTouch = false;
            }
            if (isPainting) {
                handlePaintEnd();
            }
        });

        // دعم العمل على أجهزة الكمبيوتر أو عبر الماوس الاعتيادي أيضاً
        workspace.addEventListener('mousedown', (e) => {
            if (e.button === 0) handlePaintStart(e.clientX, e.clientY);
        });
        workspace.addEventListener('mousemove', (e) => {
            if (isPainting) handlePaintMove(e.clientX, e.clientY);
        });
        workspace.addEventListener('mouseup', () => { if (isPainting) handlePaintEnd(); });

        // تحويل إحداثيات الضغط الخارجي على الشاشة لتسقط تحت موضع القلم أو الإصبع بدقة تامة على الكانفاس الدوارة والمهيأة
        function getCanvasSpaceCoordinates(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            
            // حساب المسافة من مركز الكanvas الحالي الفعلي
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            let relX = clientX - centerX;
            let relY = clientY - centerY;

            // فك زاوية دوران الكانفاس برمجياً وعكس تأثير التدوير لتتبع إصبعكِ في مكانه الحقيقي تماماً
            const rad = (-viewRotation * Math.PI) / 135;
            const rotX = relX * Math.cos(rad) - relY * Math.sin(rad);
            const rotY = relX * Math.sin(rad) + relY * Math.cos(rad);

            // تعديل المقاييس بناءً على الـ Zoom الحالي المطبق وعامل التمدد
            const finalX = rotX / (rect.width / targetWidth) + targetWidth / 2;
            const finalY = rotY / (rect.height / targetHeight) + targetHeight / 2;

            return { x: finalX, y: finalY };
        }

        function handlePaintStart(clientX, clientY) {
            const pos = getCanvasSpaceCoordinates(clientX, clientY);
            
            if (activeTool === 'picker') {
                pickColorAtPoint(pos.x, pos.y);
                return;
            }
            if (activeTool === 'bucket') {
                saveCanvasState();
                executeFloodFill(Math.floor(pos.x), Math.floor(pos.y), selectedColor);
                return;
            }

            isPainting = true;
            saveCanvasState();
            points = [pos];
        }

        function handlePaintMove(clientX, clientY) {
            if (!isPainting) return;
            const pos = getCanvasSpaceCoordinates(clientX, clientY);
            points.push(pos);

            if (points.length > 2) {
                const i = points.length - 2;
                // رسم خطوط ناعمة خالية من التشوهات أو الزوايا الحادة عبر محاذاة المنحنيات التربيعية الذكية
                const xc = (points[i].x + points[i + 1].x) / 2;
                const yc = (points[i].y + points[i + 1].y) / 2;

                ctx.beginPath();
                ctx.moveTo(points[i - 1].x, points[i - 1].y);
                ctx.quadraticCurveTo(points[i].x, points[i].y, xc, yc);

                ctx.lineWidth = document.getElementById('brushSize').value;
                const opacity = document.getElementById('brushOpacity').value / 100;
                
                if (activeTool === 'eraser') {
                    ctx.globalCompositeOperation = 'destination-out';
                    ctx.strokeStyle = `rgba(0,0,0,${opacity})`;
                } else {
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.strokeStyle = convertHexToRgbA(selectedColor, opacity);
                }

                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.stroke();
            }
        }

        function handlePaintEnd() { isPainting = false; points = []; }

        function convertHexToRgbA(hex, opacity) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r},${g},${b},${opacity})`;
        }

        // منتقي الألوان اللمسي المباشر Eyedropper
        function pickColorAtPoint(x, y) {
            const imgData = ctx.getImageData(x * dpr, y * dpr, 1, 1).data;
            if (imgData[3] === 0) return; // الحفاظ على الشفافية
            const r = imgData[0].toString(16).padStart(2, '0');
            const g = imgData[1].toString(16).padStart(2, '0');
            const b = imgData[2].toString(16).padStart(2, '0');
            updateGlobalColor(`#${r}${g}${b}`);
        }

        function updateGlobalColor(hex) {
            selectedColor = hex;
            document.getElementById('colorBoxPreview').style.backgroundColor = hex;
            document.getElementById('colorHexText').innerText = hex.toUpperCase();
        }

        // محرك تعبئة المساحات المغلقة الفوري (Flood Fill Engine)
        function executeFloodFill(startX, startY, fillHex) {
            const w = canvas.width;
            const h = canvas.height;
            const imgData = ctx.getImageData(0, 0, w, h);
            const data = imgData.data;

            const sX = Math.floor(startX * dpr);
            const sY = Math.floor(startY * dpr);

            if(sX < 0 || sX >= w || sY < 0 || sY >= h) return;

            const targetR = parseInt(fillHex.slice(1,3), 16);
            const targetG = parseInt(fillHex.slice(3,5), 16);
            const targetB = parseInt(fillHex.slice(5,7), 16);

            const startIdx = (sY * w + sX) * 4;
            const startR = data[startIdx];
            const startG = data[startIdx+1];
            const startB = data[startIdx+2];
            const startA = data[startIdx+3];

            if (startR === targetR && startG === targetG && startB === targetB) return;

            const queue = [[sX, sY]];
            while(queue.length > 0) {
                const [cx, cy] = queue.pop();
                const idx = (cy * w + cx) * 4;

                if(data[idx] === startR && data[idx+1] === startG && data[idx+2] === startB && data[idx+3] === startA) {
                    data[idx] = targetR; data[idx+1] = targetG; data[idx+2] = targetB; data[idx+3] = 255;

                    if(cx > 0) queue.push([cx - 1, cy]);
                    if(cx < w - 1) queue.push([cx + 1, cy]);
                    if(cy > 0) queue.push([cx, cy - 1]);
                    if(cy < h - 1) queue.push([cx, cy + 1]);
                }
            }
            ctx.putImageData(imgData, 0, 0);
        }

        // 🎨 بناء لوحة وعجلة الألوان المطابقة تماماً لـ ibis Paint (حلقة دائرية + ماسة وسطى)
        const hueCanvas = document.getElementById('hueCanvas');
        const hueCtx = hueCanvas.getContext('2d');
        const slCanvas = document.getElementById('slCanvas');
        const slCtx = slCanvas.getContext('2d');

        let currentHue = 0;

        function renderHueWheel() {
            const r = hueCanvas.width / 2;
            hueCtx.clearRect(0,0,hueCanvas.width,hueCanvas.height);
            for(let angle=0; angle<360; angle++) {
                const startRad = (angle - 0.5) * Math.PI / 180;
                const endRad = (angle + 0.5) * Math.PI / 180;
                hueCtx.beginPath();
                hueCtx.moveTo(r, r);
                hueCtx.arc(r, r, r, startRad, endRad);
                hueCtx.closePath();
                hueCtx.fillStyle = `hsl(${angle}, 100%, 50%)`;
                hueCtx.fill();
            }
            // إفراغ الدائرة الداخلية لتصبح على شكل حلقة
            hueCtx.globalCompositeOperation = 'destination-out';
            hueCtx.beginPath();
            hueCtx.arc(r, r, r - 22, 0, Math.PI * 2);
            hueCtx.fill();
            hueCtx.globalCompositeOperation = 'source-over';
        }

        function renderSquareSL(hue) {
            const w = slCanvas.width;
            const h = slCanvas.height;
            for(let x=0; x<w; x++) {
                for(let y=0; y<h; y++) {
                    const sat = (x / w) * 100;
                    const light = (1 - (y / h)) * 100;
                    slCtx.fillStyle = `hsl(${hue}, ${sat}%, ${light}%)`;
                    slCtx.fillRect(x, y, 1, 1);
                }
            }
        }

        // تفعيل اللمس على حلقة الألوان الخارجية والماسة الداخلية
        function initColorPickers() {
            renderHueWheel();
            renderSquareSL(currentHue);

            hueCanvas.addEventListener('pointerdown', handleHuePick);
            hueCanvas.addEventListener('pointermove', (e) => { if(e.buttons === 1) handleHuePick(e); });

            slCanvas.addEventListener('pointerdown', handleSLPick);
            slCanvas.addEventListener('pointermove', (e) => { if(e.buttons === 1) handleSLPick(e); });
        }

        function handleHuePick(e) {
            const rect = hueCanvas.getBoundingClientRect();
            const x = e.clientX - rect.left - rect.width/2;
            const y = e.clientY - rect.top - rect.height/2;
            let angle = Math.atan2(y, x) * 180 / Math.PI;
            if(angle < 0) angle += 360;
            currentHue = Math.floor(angle);
            
            // تحديث مكان مؤشر الحلقة الدائرية
            const rad = angle * Math.PI / 180;
            const pX = rect.width/2 + (rect.width/2 - 11) * Math.cos(rad);
            const pY = rect.height/2 + (rect.height/2 - 11) * Math.sin(rad);
            document.getElementById('huePicker').style.left = pX + 'px';
            document.getElementById('huePicker').style.top = pY + 'px';

            renderSquareSL(currentHue);
        }

        function handleSLPick(e) {
            const rect = slCanvas.getBoundingClientRect();
            const x = Math.max(0, Math.min(rect.width, e.clientX - rect.left));
            const y = Math.max(0, Math.min(rect.height, e.clientY - rect.top));

            document.getElementById('slPicker').style.left = (x + 35) + 'px';
            document.getElementById('slPicker').style.top = (y + 35) + 'px';

            const sat = (x / rect.width) * 100;
            const light = (1 - (y / rect.height)) * 100;
            
            // تحويل قيم HSL المحددة إلى كود الـ Hex المقروء عالمياً
            const hex = hslToHex(currentHue, sat, light);
            updateGlobalColor(hex);
        }

        function hslToHex(h, s, l) {
            l /= 100; const a = s * Math.min(l, 1 - l) / 100;
            const f = n => { const k = (n + h / 30) % 12; const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1); return Math.round(255 * color).toString(16).padStart(2, '0'); };
            return `#${f(0)}${f(4)}${f(8)}`;
        }

        // إدارة ظهور واختفاء القوائم المنبثقة من الأزرار السفلية بطريقة مرنة وسريعة
        const toggleToolsBtn = document.getElementById('toggleToolsBtn');
        const toolsPopup = document.getElementById('toolsPopup');
        const toggleColorBtn = document.getElementById('toggleColorBtn');
        const colorPanel = document.getElementById('colorPanel');

        toggleToolsBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            colorPanel.classList.remove('show');
            toolsPopup.classList.toggle('show');
        });

        toggleColorBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            toolsPopup.classList.remove('show');
            colorPanel.classList.toggle('show');
        });

        // اختيار الأدوات المختلفة من القائمة الشبيهة بالصورة الثالثة
        const toolRows = document.querySelectorAll('.tool-row');
        toolRows.forEach(row => {
            row.addEventListener('click', () => {
                toolRows.forEach(r => r.classList.remove('active'));
                row.classList.add('active');
                activeTool = row.getAttribute('data-tool');
                toolsPopup.classList.remove('show');
            });
        });

        // إغلاق أي نافذة مفتوحة بمجرد الضغط في أي مكان فارغ داخل منطقة الرسم
        workspace.addEventListener('click', (e) => {
            if(e.target.id === 'workspace' || e.target.id === 'paintCanvas') {
                toolsPopup.classList.remove('show');
                colorPanel.classList.remove('show');
            }
        });

        // تشغيل وإطلاق المنظومة بالكامل
        initColorPickers();
        updateUndoRedoButtons();
    </script>
</body>
</html>
