<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>أسماء الله الحسنى</title>
    <style>
        :root { --main-gold: #c5a059; --bg-cream: #f5e6d3; --text-brown: #4e342e; }
        body { 
            background-color: var(--bg-cream); 
            background-size: cover; 
            background-position: center; 
            height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center; 
            font-family: 'Traditional Arabic', serif; color: var(--text-brown);
        }
        .card { 
            background: rgba(245, 230, 211, 0.9); padding: 40px; border-radius: 15px; 
            text-align: center; width: 85%; border: 2px solid var(--main-gold);
            box-shadow: 0 0 20px rgba(78, 52, 46, 0.2);
        }
        h1 { color: var(--main-gold); border-bottom: 2px solid var(--main-gold); padding-bottom: 10px; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid var(--main-gold); border-radius: 5px; background: #fff; }
        button { background: var(--main-gold); color: white; cursor: pointer; font-weight: bold; }
        
        /* تصميم الظرف */
        #envelope { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--bg-cream); display: none; justify-content: center; align-items: center; 
            flex-direction: column; z-index: 999; 
        }
        .envelope-card { 
            border: 3px double var(--main-gold); padding: 50px; border-radius: 10px; 
            background: #fff; text-align: center; box-shadow: 0 0 30px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="card" id="setup">
        <h1>الله أولاً</h1>
        <p>تأملي في أسماء الله الحسنى</p>
        <input type="text" id="names" placeholder="أسماء اللاعبات (فاطمة / مريم / زينب)">
        <input type="text" id="target" placeholder="اسم الله لهذا اليوم">
        <input type="file" onchange="loadBg(event)" accept="image/*" style="font-size: 12px;">
        <button onclick="startGame()">بدء التدبر</button>
    </div>

    <div id="envelope">
        <div class="envelope-card">
            <h2 id="msg">أعطي الهاتف لـ: ...</h2>
            <button onclick="openEnvelope()" id="envBtn" style="width: auto;">فتح الظرف</button>
            <div id="role" style="display:none; font-size: 28px; margin: 20px; color: var(--main-gold);">---</div>
        </div>
    </div>

    <script>
        let roles = [], currentIndex = 0;

        function loadBg(e) {
            let reader = new FileReader();
            reader.onload = function(){ document.body.style.backgroundImage = "url('" + reader.result + "')"; }
            reader.readAsDataURL(e.target.files[0]);
        }

        function startGame() {
            let names = document.getElementById('names').value.split('/').map(n => n.trim());
            let target = document.getElementById('target').value;
            let spyIdx = Math.floor(Math.random() * names.length);
            roles = names.map((n, i) => ({ name: n, role: (i === spyIdx ? "أنتِ المتأملة (الدخيلة)" : target) }));
            currentIndex = 0;
            showNext();
        }

        function showNext() {
            if(currentIndex < roles.length) {
                document.getElementById('msg').innerText = "أعطي الهاتف لـ: " + roles[currentIndex].name;
                document.getElementById('role').style.display = "none";
                document.getElementById('envBtn').style.display = "inline-block";
                document.getElementById('envBtn').innerText = "فتح الظرف";
                document.getElementById('envBtn').onclick = openEnvelope;
                document.getElementById('envelope').style.display = "flex";
            } else {
                alert("انتهت الجلسة، تقبل الله منا ومنكم.");
                document.getElementById('envelope').style.display = "none";
            }
        }

        function openEnvelope() {
            document.getElementById('role').innerText = roles[currentIndex].role;
            document.getElementById('role').style.display = "block";
            document.getElementById('envBtn').innerText = "تم (إغلاق)";
            document.getElementById('envBtn').onclick = closeEnvelope;
        }

        function closeEnvelope() {
            currentIndex++;
            showNext();
        }
    </script>
</body>
</html>
