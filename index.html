<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لعبة الأسماء الإيمانية</title>
    <style>
        body { background-size: cover; background-position: center; height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center; color: white; font-family: sans-serif; transition: background 0.5s; }
        .card { background: rgba(0,0,0,0.6); padding: 30px; border-radius: 20px; text-align: center; width: 80%; backdrop-filter: blur(5px); }
        input, button { width: 90%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; font-size: 16px; }
        
        /* تأثير الظرف */
        #envelope { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #2c3e50; display: none; justify-content: center; align-items: center; flex-direction: column; z-index: 999; }
        .envelope-btn { background: #f1c40f; color: black; padding: 20px 40px; border-radius: 50px; cursor: pointer; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card" id="setup">
        <h1>إعدادات الجولة</h1>
        <input type="text" id="names" placeholder="الأسماء (سارة / مريم / زينب)">
        <input type="text" id="target" placeholder="اسم الله المختار">
        <input type="file" onchange="loadBg(event)" accept="image/*">
        <button onclick="startGame()">بدء اللعبة</button>
    </div>

    <div id="envelope">
        <h2 id="msg">أعطي الهاتف لـ: ...</h2>
        <div class="envelope-btn" onclick="openEnvelope()" id="envBtn">فتح الظرف</div>
        <div id="role" style="display:none; font-size: 30px; margin: 20px;">---</div>
    </div>

    <script>
        let roles = [], currentIndex = 0;

        function loadBg(e) {
            let reader = new FileReader();
            reader.onload = function(){ document.body.style.backgroundImage = "url('" + reader.result + "')"; }
            reader.readAsDataURL(e.target.files[0]);
        }

        function startGame() {
            let names = document.getElementById('names').value.split('/').map(n => n.trim());
            let target = document.getElementById('target').value;
            let spyIdx = Math.floor(Math.random() * names.length);
            roles = names.map((n, i) => ({ name: n, role: (i === spyIdx ? "أنتِ الدخيلة!" : target) }));
            currentIndex = 0;
            showNext();
        }

        function showNext() {
            if(currentIndex < roles.length) {
                document.getElementById('msg').innerText = "أعطي الهاتف لـ: " + roles[currentIndex].name;
                document.getElementById('role').style.display = "none";
                document.getElementById('envBtn').style.display = "block";
                document.getElementById('envelope').style.display = "flex";
            } else {
                alert("انتهت الجولة!");
                document.getElementById('envelope').style.display = "none";
            }
        }

        function openEnvelope() {
            document.getElementById('role').innerText = roles[currentIndex].role;
            document.getElementById('role').style.display = "block";
            document.getElementById('envBtn').innerText = "تم (إغلاق الظرف)";
            document.getElementById('envBtn').onclick = closeEnvelope;
        }

        function closeEnvelope() {
            currentIndex++;
            document.getElementById('envBtn').innerText = "فتح الظرف";
            document.getElementById('envBtn').onclick = openEnvelope;
            showNext();
        }
    </script>
</body>
</html>
