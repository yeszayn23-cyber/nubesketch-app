<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NubeSketch Engine V3</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; user-select: none; -webkit-user-select: none; }
        body { background: #0c0a09; color: #f5f5f4; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* شريط علوي فخم */
        .top-bar { height: 50px; background: #1c1917; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; border-bottom: 1px solid #2e2a24; z-index: 10; }
        .brand { font-weight: 800; font-size: 16px; color: #e7e5e4; letter-spacing: 1px; }
        .brand span { color: #d4af37; }
        .top-actions { display: flex; gap: 10px; }

        /* منطقة العمل */
        .workspace { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; background: #141210; overflow: hidden; }
        
        /* حاوية الطبقات المتعددة فوق بعضها بدقة */
        .canvas-container { position: relative; box-shadow: 0 15px 40px rgba(0,0,0,0.8); background: #ffffff; overflow: hidden; }
        .canvas-container canvas { position: absolute; top: 0; left: 0; display: block; image-rendering: optimizeQuality; }
        /* طبقة الرسم النشطة تكون في الأعلى برمجياً أثناء التفاعل */
        
        /* شريط الأدوات الجانبي السريع للتحكم الفوري (حجم وشفافية) */
        .side-sliders { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 25px; background: rgba(28,25,23,0.85); backdrop-filter: blur(10px); padding: 20px 12px; border-radius: 20px; border: 1px solid #3f3f46; z-index: 10; }
        .vertical-slider-group { display: flex; flex-direction: column; align-items: center; gap: 8px; font-size: 11px; color: #a8a29e; }
        .vertical-slider-group input { writing-mode: vertical-lr; direction: ltr; width: 15px; height: 120px; accent-color: #d4af37; cursor: pointer; }

        /* شريط الأدوات السفلي العائم */
        .bottom-nav { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(28, 25, 23, 0.95); backdrop-filter: blur(12px); border: 1px solid #44403c; padding: 6px 16px; border-radius: 30px; display: flex; gap: 15px; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.7); z-index: 10; }
        .nav-item { background: none; border: none; color: #a8a29e; font-size: 20px; cursor: pointer; padding: 8px; border-radius: 50%; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
        .nav-item.active { color: #d4af37; background: #2e2a24; transform: scale(1.05); }

        /* اللوحات المنبثقة الفخمة */
        .panel { position: absolute; bottom: 85px; left: 50%; transform: translateX(-50%); background: #1c1917; border: 1px solid #3c3836; border-radius: 16px; padding: 15px; width: 290px; box-shadow: 0 20px 40px rgba(0,0,0,0.6); display: none; flex-direction: column; gap: 12px; z-index: 15; }
        .panel.show { display: flex; }
        .panel-title { font-size: 13px; color: #78716c; font-weight: 600; border-bottom: 1px solid #2e2a24; padding-bottom: 5px; display: flex; justify-content: space-between; }

        /* تصميم مدير الطبقات */
        .layers-list { display: flex; flex-direction: column; gap: 6px; max-height: 160px; overflow-y: auto; padding-right: 2px; }
        .layer-item { display: flex; align-items: center; justify-content: space-between; background: #262220; padding: 8px 12px; border-radius: 8px; border: 1px solid transparent; cursor: pointer; }
        .layer-item.active { border-color: #d4af37; background: #322b24; }
        .layer-meta { display: flex; align-items: center; gap: 8px; font-size: 13px; }
        .layer-controls { display: flex; gap: 8px; }
        .layer-btn { background: none; border: none; color: #a8a29e; cursor: pointer; font-size: 14px; }
        .layer-btn.active { color: #d4af37; }
        .layer-actions-bar { display: flex; justify-content: space-between; margin-top: 5px; }

        /* ميزات الفرش المتقدمة */
        .brush-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .brush-option { background: #262220; border: 1px solid transparent; color: #e7e5e4; padding: 10px; border-radius: 8px; font-size: 12px; cursor: pointer; text-align: center; }
        .brush-option.selected { border-color: #d4af37; color: #d4af37; background: #322b24; }

        .btn-premium { background: #d4af37; color: #0c0a09; font-weight: 700; border: none; padding: 6px 16px; border-radius: 20px; font-size: 13px; cursor: pointer; box-shadow: 0 4px 10px rgba(212,175,55,0.25); }
        .btn-secondary { background: #262220; color: #e7e5e4; border: none; padding: 6px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- الشريط العلوي -->
    <div class="top-bar">
        <div class="brand">Nube<span>Sketch</span> Pro</div>
        <div class="top-actions">
            <button class="btn-secondary" id="clear">تصفية</button>
            <button class="btn-premium" id="share">تصدير ✨</button>
        </div>
    </div>

    <!-- مساحة الرسم الذكية -->
    <div class="workspace">
        
        <!-- حاوية الكانفاس الديناميكية للطبقات -->
        <div class="canvas-container" id="canvasContainer"></div>

        <!-- شريط التحكم الجانبي النحيف (ستايل إيبيس باينت الفوري) -->
        <div class="side-sliders">
            <div class="vertical-slider-group">
                <span>الحجم</span>
                <input type="range" id="size" min="1" max="100" value="8">
            </div>
            <div class="vertical-slider-group">
                <span>الشفافية</span>
                <input type="range" id="opacity" min="1" max="100" value="100">
            </div>
        </div>

        <!-- لوحة الفرش والمثبت (Stabilizer) -->
        <div class="panel" id="brushPanel">
            <div class="panel-title">تخصيص أداة الرسم</div>
            <div class="vertical-slider-group" style="flex-direction:row; justify-content:space-between; width:100%; padding: 5px 0;">
                <span>مُثبّت الخطوط (Stabilizer)</span>
                <input type="range" id="stabilizer" min="0" max="20" value="8" style="writing-mode:horizontal-tb; width:100px; height:auto;">
            </div>
            <div class="brush-grid">
                <div class="brush-option selected" data-brush="pen">قلم حبر جرافيك</div>
                <div class="brush-option" data-brush="brush">بخاخ ناعم (Airbrush)</div>
                <div class="brush-option" data-brush="hair">فرشاة شعر تفاعلية</div>
                <div class="brush-option" data-brush="fabric">نسيج الكتان الحقيقي</div>
            </div>
        </div>

        <!-- لوحة نظام الطبقات الاحترافي (Layers Panel) -->
        <div class="panel" id="layersPanel">
            <div class="panel-title">
                <span>إدارة الطبقات</span>
                <span id="layer-count">الطبقات: 1</span>
            </div>
            <div class="layers-list" id="layersList">
                <!-- سيتم توليد بنية الطبقات برمجياً هنا -->
            </div>
            <div class="layer-actions-bar">
                <button class="btn-secondary" id="add-layer" style="padding:4px 10px; font-size:12px;">+ طبقة جديدة</button>
                <button class="btn-secondary" id="delete-layer" style="padding:4px 10px; font-size:12px; color:#ef4444;">حذف</button>
            </div>
        </div>

        <!-- شريط التنقل السفلي الاحترافي -->
        <div class="bottom-nav">
            <button class="nav-item active" id="nav-draw" data-main-tool="draw" title="الرسم">🖌️</button>
            <button class="nav-item" id="nav-eraser" data-main-tool="eraser" title="الممحاة">🧽</button>
            <button class="nav-item" id="nav-bucket" data-main-tool="bucket" title="دلو التلوين">🪣</button>
            <input type="color" id="color" style="width:30px; height:30px; border:none; border-radius:50%; background:none; cursor:pointer;" value="#000000">
            <button class="nav-item" id="toggle-brush-panel" title="الفرش والمثبت">🎨</button>
            <button class="nav-item" id="toggle-layers-panel" title="الطبقات">🥞</button>
        </div>
    </div>

    <script>
        const container = document.getElementById('canvasContainer');
        const layersList = document.getElementById('layersList');
        
        // إعدادات أبعاد اللوحة الفنية ثابتة وموحدة لجميع الطبقات
        const canvasWidth = window.innerWidth - 70;
        const canvasHeight = window.innerHeight - 160;
        container.style.width = canvasWidth + 'px';
        container.style.height = canvasHeight + 'px';

        let layers = []; // مصفوفة لتخزين الكائنات البرمجية للطبقات
        let activeLayerIndex = 0;
        let layerCounter = 0;

        let painting = false;
        let currentTool = 'draw'; 
        let currentBrush = 'pen';

        // محاذاة تنعيم وتثبيت الخطوط الإحترافي (Stabilizer)
        let strokePoints = [];

        // دالة إنشاء طبقة برمجية وفيزيائية جديدة داخل الحاوية
        function createLayer() {
            layerCounter++;
            const canvas = document.createElement('canvas');
            canvas.width = canvasWidth;
            canvas.height = canvasHeight;
            canvas.style.zIndex = layers.length; // ترتيب ظهور الطبقة عمودياً
            container.appendChild(canvas);

            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            
            const layerObj = {
                id: layerCounter,
                name: `طبقة ${layerCounter}`,
                canvas: canvas,
                ctx: ctx,
                alphaLock: false
            };

            // الطبقة الأولى يتم تعبئتها بالخلفية البيضاء الأساسية
            if (layers.length === 0) {
                ctx.fillStyle = "#ffffff";
                ctx.fillRect(0, 0, canvasWidth, canvasHeight);
            }

            layers.push(layerObj);
            activeLayerIndex = layers.length - 1;
            renderLayersUI();
            updateActiveCanvasListeners();
        }

        // تحديث وعرض واجهة مدير الطبقات الفخم
        function renderLayersUI() {
            layersList.innerHTML = '';
            document.getElementById('layer-count').innerText = `الطبقات: ${layers.length}`;
            
            // نعرضها مقلوبة لتطابق الترتيب البصري (العليا فوق)
            for (let i = layers.length - 1; i >= 0; i--) {
                const layer = layers[i];
                const item = document.createElement('div');
                item.className = `layer-item ${i === activeLayerIndex ? 'active' : ''}`;
                item.onclick = () => { activeLayerIndex = i; renderLayersUI(); updateActiveCanvasListeners(); };

                item.innerHTML = `
                    <div class="layer-meta">
                        <span>🥞</span>
                        <span>${layer.name}</span>
                    </div>
                    <div class="layer-controls">
                        <button class="layer-btn ${layer.alphaLock ? 'active' : ''}" onclick="event.stopPropagation(); toggleAlphaLock(${i});" title="قفل الشفافية">🔒</button>
                    </div>
                `;
                layersList.appendChild(item);
            }
        }

        function toggleAlphaLock(index) {
            layers[index].alphaLock = !layers[index].alphaLock;
            renderLayersUI();
        }

        // دالة تحديث ربط أحداث الإدخال بالطبقة الفعالة حالياً فقط
        function updateActiveCanvasListeners() {
            // إزالة المستمعات من كل الطبقات لمنع التداخل
            layers.forEach(l => {
                const c = l.canvas;
                c.onmousedown = c.onmouseup = c.onmousemove = null;
                c.ontouchstart = c.ontouchend = c.ontouchmove = null;
                c.style.pointerEvents = 'none'; // تعطيل التفاعل البصري
            });

            // تفعيل التفاعل فقط على الكانفاس النشط حالياً
            const activeCanvas = layers[activeLayerIndex].canvas;
            activeCanvas.style.pointerEvents = 'auto';

            activeCanvas.addEventListener('mousedown', startStroke);
            activeCanvas.addEventListener('mouseup', stopStroke);
            activeCanvas.addEventListener('mousemove', moveStroke);
            activeCanvas.addEventListener('touchstart', (e) => { e.preventDefault(); startStroke(e); });
            activeCanvas.addEventListener('touchend', stopStroke);
            activeCanvas.addEventListener('touchmove', (e) => { e.preventDefault(); moveStroke(e); });
        }

        // تحويل الهكس للألوان ودمج الشفافية الحالية لفرش الرسم
        function getDrawColor() {
            const hex = document.getElementById('color').value;
            const opacity = document.getElementById('opacity').value / 100;
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return { r, g, b, a: opacity, string: `rgba(${r},${g},${b},${opacity})` };
        }

        // محرك الرسم المتطور المدعم بخواص قفل الشفافية وتنعيم المسار
        function runDrawingEngine(p0, p1, xc, yc) {
            const activeLayer = layers[activeLayerIndex];
            const ctx = activeLayer.ctx;
            const size = parseFloat(document.getElementById('size').value);
            const colorObj = getDrawColor();

            ctx.save();
            // تفعيل ميزة قفل الشفافية (Alpha Lock) الاحترافية برمجياً
            if (activeLayer.alphaLock) {
                ctx.globalCompositeOperation = 'source-atop'; // يرسم فقط فوق البيكسلات الملونة مسبقاً في هذه الطبقة!
            } else {
                ctx.globalCompositeOperation = 'source-over';
            }

            ctx.lineWidth = size;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            if (currentTool === 'eraser') {
                // الممحاة في الطبقات العليا تقوم بمسح البيكسلات وجعلها شفافة تماماً
                ctx.globalCompositeOperation = activeLayerIndex === 0 ? 'source-over' : 'destination-out';
                ctx.strokeStyle = activeLayerIndex === 0 ? "#ffffff" : "rgba(0,0,0,1)";
                ctx.beginPath(); ctx.moveTo(p0.x, p0.y); ctx.quadraticCurveTo(p1.x, p1.y, xc, yc); ctx.stroke();
            } else if (currentTool === 'draw') {
                ctx.strokeStyle = colorObj.string;

                if (currentBrush === 'pen') {
                    ctx.beginPath(); ctx.moveTo(p0.x, p0.y); ctx.quadraticCurveTo(p1.x, p1.y, xc, yc); ctx.stroke();
                } 
                else if (currentBrush === 'brush') {
                    ctx.strokeStyle = `rgba(${colorObj.r},${colorObj.g},${colorObj.b},${colorObj.a * 0.15})`;
                    for(let j = 1; j <= 5; j++) {
                        ctx.lineWidth = size * (1 + j * 0.2);
                        ctx.beginPath(); ctx.moveTo(p0.x, p0.y); ctx.quadraticCurveTo(p1.x, p1.y, xc, yc); ctx.stroke();
                    }
                } 
                else if (currentBrush === 'hair') {
                    const dx = p1.x - p0.x; const dy = p1.y - p0.y;
                    const angle = Math.atan2(dy, dx) + Math.PI / 2;
                    const density = Math.min(12, Math.max(4, size / 3)); 
                    ctx.strokeStyle = `rgba(${colorObj.r},${colorObj.g},${colorObj.b},${colorObj.a * 0.5})`;
                    ctx.lineWidth = 1.1;

                    for (let j = -size / 2; j < size / 2; j += size / density) {
                        const offsetX = Math.cos(angle) * j; const offsetY = Math.sin(angle) * j;
                        ctx.beginPath();
                        ctx.moveTo(p0.x + offsetX, p0.y + offsetY);
                        ctx.quadraticCurveTo(p1.x + offsetX, p1.y + offsetY, xc + offsetX, yc + offsetY);
                        ctx.stroke();
                    }
                } 
                else if (currentBrush === 'fabric') {
                    ctx.beginPath(); ctx.moveTo(p0.x, p0.y); ctx.quadraticCurveTo(p1.x, p1.y, xc, yc); ctx.stroke();
                    ctx.strokeStyle = `rgba(255,255,255,${colorObj.a * 0.3})`; ctx.lineWidth = 1;
                    for (let k = 0; k < Math.floor(size / 3); k++) {
                        const offset = (Math.random() - 0.5) * size;
                        ctx.beginPath(); ctx.moveTo(p0.x + offset, p0.y - offset); ctx.lineTo(xc + offset, yc - offset); ctx.stroke();
                    }
                }
            }
            ctx.restore();
        }

        // معالجة حركة الرسم بالاعتماد على ميزة الـ Stabilizer (خوارزمية المتوسط المتحرك للتنعيم)
        function getStabilizedPoint(nextPoint) {
            const strength = parseInt(document.getElementById('stabilizer').value);
            if (strokePoints.length === 0) return nextPoint;

            // حساب النقطة بناءً على ثقل وعمق التثبيت المختار
            const lastPoint = strokePoints[strokePoints.length - 1];
            return {
                x: lastPoint.x + (nextPoint.x - lastPoint.x) / (strength + 1),
                y: lastPoint.y + (nextPoint.y - lastPoint.y) / (strength + 1)
            };
        }

        function startStroke(e) {
            const pos = getCoordinates(e);
            if (currentTool === 'bucket') {
                const hex = document.getElementById('color').value;
                const rgb = [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
                // دمج نظام الدلو على الطبقة الحالية
                floodFillEngine(Math.floor(pos.x), Math.floor(pos.y), rgb);
                return;
            }
            painting = true;
            const stabilized = getStabilizedPoint(pos);
            strokePoints = [stabilized];
        }

        function stopStroke() { painting = false; strokePoints = []; }
        
        function moveStroke(e) {
            if (!painting || currentTool === 'bucket') return;
            const rawPos = getCoordinates(e);
            const stabilizedPos = getStabilizedPoint(rawPos);
            
            strokePoints.push(stabilizedPos);

            if (strokePoints.length >= 3) {
                const i = strokePoints.length - 2;
                const xc = (strokePoints[i].x + strokePoints[i + 1].x) / 2;
                const yc = (strokePoints[i].y + strokePoints[i + 1].y) / 2;
                runDrawingEngine(strokePoints[i - 1], strokePoints[i], xc, yc);
            }
        }

        function getCoordinates(e) {
            const activeCanvas = layers[activeLayerIndex].canvas;
            const rect = activeCanvas.getBoundingClientRect();
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        // نظام تعبئة المساحات الذكي (Flood Fill) المدمج بالطبقة
        function floodFillEngine(startX, startY, fillRGB) {
            const ctx = layers[activeLayerIndex].ctx;
            const imageData = ctx.getImageData(0, 0, canvasWidth, canvasHeight);
            const data = imageData.data;
            const targetIdx = (startY * canvasWidth + startX) * 4;
            const targetColor = [data[targetIdx], data[targetIdx+1], data[targetIdx+2], data[targetIdx+3]];
            
            if (targetColor[0] === fillRGB[0] && targetColor[1] === fillRGB[1] && targetColor[2] === fillRGB[2]) return;

            const queue = [[startX, startY]];
            while (queue.length > 0) {
                const [x, y] = queue.shift();
                const idx = (y * canvasWidth + x) * 4;

                if (data[idx] === targetColor[0] && data[idx+1] === targetColor[1] && data[idx+2] === targetColor[2]) {
                    data[idx] = fillRGB[0]; data[idx+1] = fillRGB[1]; data[idx+2] = fillRGB[2]; data[idx+3] = 255;

                    if (x > 0) queue.push([x - 1, y]);
                    if (x < canvasWidth - 1) queue.push([x + 1, y]);
                    if (y > 0) queue.push([x, y - 1]);
                    if (y < canvasHeight - 1) queue.push([x, y + 1]);
                }
            }
            ctx.putImageData(imageData, 0, 0);
        }

        // إدارة لوحات التحكم المنبثقة التفاعلية السفلية
        function closeAllPanels() {
            document.getElementById('brushPanel').classList.remove('show');
            document.getElementById('layersPanel').classList.remove('show');
        }

        document.getElementById('toggle-brush-panel').addEventListener('click', (e) => {
            e.stopPropagation(); const p = document.getElementById('brushPanel');
            const state = p.classList.contains('show'); closeAllPanels(); if(!state) p.classList.add('show');
        });

        document.getElementById('toggle-layers-panel').addEventListener('click', (e) => {
            e.stopPropagation(); const p = document.getElementById('layersPanel');
            const state = p.classList.contains('show'); closeAllPanels(); if(!state) p.classList.add('show');
        });

        document.querySelector('.workspace').addEventListener('click', () => closeAllPanels());

        // إدارة إضافة وحذف الطبقات عبر الأزرار الفخمة
        document.getElementById('add-layer').addEventListener('click', () => {
            if(layers.length < 10) { createLayer(); } else { alert('تم الوصول للحد الأقصى للطبقات حالياً!'); }
        });

        document.getElementById('delete-layer').addEventListener('click', () => {
            if (layers.length > 1) {
                container.removeChild(layers[activeLayerIndex].canvas);
                layers.splice(activeLayerIndex, 1);
                activeLayerIndex = layers.length - 1;
                // إعادة ترتيب الـ zIndex للطبقات المتبقية بدقة
                layers.forEach((l, idx) => l.canvas.style.zIndex = idx);
                renderLayersUI();
                updateActiveCanvasListeners();
            } else {
                alert('لا يمكن حذف الطبقة الأساسية الأخيرة!');
            }
        });

        const mainTools = document.querySelectorAll('[data-main-tool]');
        mainTools.forEach(btn => {
            btn.addEventListener('click', () => {
                mainTools.forEach(b => b.classList.remove('active')); btn.classList.add('active');
                currentTool = btn.getAttribute('data-main-tool'); closeAllPanels();
            });
        });

        const brushOptions = document.querySelectorAll('[data-brush]');
        brushOptions.forEach(opt => {
            opt.addEventListener('click', () => {
                brushOptions.forEach(o => o.classList.remove('selected')); opt.classList.add('selected');
                currentBrush = opt.getAttribute('data-brush');
            });
        });

        document.getElementById('clear').addEventListener('click', () => {
            const ctx = layers[activeLayerIndex].ctx;
            if(activeLayerIndex === 0) {
                ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, canvasWidth, canvasHeight);
            } else {
                ctx.clearRect(0, 0, canvasWidth, canvasHeight);
            }
        });

        // تشغيل المحرك والطبقة الأولى تلقائياً عند الإقلاع
        createLayer();
    </script>
</body>
</html>
