<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>إستوديو الرسم الاحترافي - محرك الفرش الشامل</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; user-select: none; -webkit-user-select: none; }
        body { background: #16161a; color: #ffffff; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* شريط التحكم العلوي */
        .top-bar { height: 50px; background: #0f0f12; display: flex; justify-content: space-between; align-items: center; padding: 0 16px; border-bottom: 1px solid #23232a; z-index: 100; }
        .brand { font-weight: bold; font-size: 14px; color: #e5e5e5; }
        .brand span { color: #38bdf8; }
        .top-actions { display: flex; gap: 8px; }

        /* منطقة العمل وحاضنة الكانفاس */
        .workspace { flex: 1; position: relative; background: #2a2a32; overflow: hidden; display: flex; justify-content: center; align-items: center; touch-action: none; }
        .canvas-transform-viewport { position: absolute; transform-origin: center center; display: flex; justify-content: center; align-items: center; pointer-events: none; }
        .canvas-container { position: relative; background: #ffffff; box-shadow: 0 10px 40px rgba(0,0,0,0.6); pointer-events: auto; }
        .canvas-container canvas { position: absolute; top: 0; left: 0; display: block; width: 100%; height: 100%; }

        /* شريط الأدوات السفلي الممتد */
        .bottom-bar { height: 65px; background: #0f0f12; border-top: 1px solid #23232a; display: flex; justify-content: space-around; align-items: center; z-index: 110; padding-bottom: env(safe-area-inset-bottom); }
        .bottom-btn { background: none; border: none; color: #a3a3c2; width: 60px; height: 50px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; gap: 4px; cursor: pointer; }
        .bottom-btn.active { color: #38bdf8; }
        .bottom-btn svg { width: 22px; height: 22px; fill: currentColor; }

        /* قائمة الأدوات العامة الجانبية */
        .tools-popup-panel { position: absolute; bottom: 75px; left: 16px; background: rgba(20, 20, 25, 0.96); backdrop-filter: blur(12px); border: 1px solid #3f3f4e; border-radius: 14px; width: 150px; display: none; flex-direction: column; padding: 6px; z-index: 150; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        .tools-popup-panel.show { display: flex; }
        .tool-row { display: flex; align-items: center; gap: 12px; width: 100%; padding: 10px 12px; background: none; border: none; color: #ffffff; text-align: right; font-size: 13px; border-radius: 8px; cursor: pointer; }
        .tool-row.active, .tool-row:hover { background: #23232a; color: #38bdf8; }
        .tool-row svg { width: 18px; height: 18px; fill: currentColor; }

        /* 🖌️ متصفح نافذة الفرش الكبرى والمقسمة حسب الصور */
        .brushes-popup-panel { position: absolute; bottom: 75px; right: 16px; left: 16px; max-width: 420px; background: rgba(20, 20, 25, 0.98); backdrop-filter: blur(15px); border: 1px solid #3f3f4e; border-radius: 16px; display: none; flex-direction: column; height: 380px; z-index: 160; box-shadow: 0 12px 40px rgba(0,0,0,0.6); overflow: hidden; }
        .brushes-popup-panel.show { display: flex; }
        .brushes-header { padding: 12px; background: #0f0f12; font-size: 13px; font-weight: bold; text-align: center; border-bottom: 1px solid #23232a; }
        .brushes-tabs { display: flex; background: #16161a; border-bottom: 1px solid #23232a; }
        .tab-btn { flex: 1; padding: 8px 4px; background: none; border: none; color: #8a8a9e; font-size: 11px; cursor: pointer; text-align: center; }
        .tab-btn.active { color: #38bdf8; border-bottom: 2px solid #38bdf8; font-weight: bold; }
        .brushes-list { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 4px; }
        .brush-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; background: rgba(255,255,255,0.02); border: 1px solid transparent; border-radius: 8px; cursor: pointer; text-align: right; }
        .brush-item:hover, .brush-item.active { background: rgba(56, 189, 248, 0.1); border-color: #38bdf8; }
        .brush-name { font-size: 13px; color: #ffffff; }
        .brush-desc { font-size: 10px; color: #8a8a9e; }

        /* 🎨 لوحة الألوان الاحترافية الدائرية */
        .color-panel { position: absolute; bottom: 75px; left: 50%; transform: translateX(-50%); background: #0f0f12; border: 1px solid #23232a; border-radius: 16px; padding: 16px; width: 280px; display: none; flex-direction: column; align-items: center; gap: 12px; z-index: 140; box-shadow: 0 12px 36px rgba(0,0,0,0.6); }
        .color-panel.show { display: flex; }
        .wheel-container { position: relative; width: 200px; height: 200px; touch-action: none; }
        #hueCanvas { position: absolute; top: 0; left: 0; border-radius: 50%; z-index: 1; }
        #slCanvas { position: absolute; top: 35px; left: 35px; z-index: 2; }
        .wheel-picker { position: absolute; width: 12px; height: 12px; border: 2px solid #ffffff; border-radius: 50%; box-shadow: 0 0 4px rgba(0,0,0,0.8); pointer-events: none; z-index: 10; transform: translate(-50%, -50%); }
        .color-preview-row { display: flex; width: 100%; align-items: center; gap: 12px; background: #16161a; padding: 8px; border-radius: 8px; }
        .color-box { width: 45px; height: 35px; border-radius: 6px; border: 1px solid #3f3f4e; }
        .color-hex-text { font-family: monospace; font-size: 14px; color: #38bdf8; }

        /* المنزلقات السفلية العائمة للتحكم السريع */
        .sliders-overlay { position: absolute; bottom: 12px; right: 16px; left: 16px; display: flex; flex-direction: column; gap: 6px; z-index: 95; background: rgba(15, 15, 18, 0.85); padding: 8px 12px; border-radius: 12px; backdrop-filter: blur(6px); border: 1px solid #23232a; }
        .slider-item { display: flex; align-items: center; gap: 10px; width: 100%; }
        .slider-item span { font-size: 11px; color: #a3a3c2; font-weight: bold; width: 40px; }
        .slider-item input { flex: 1; accent-color: #38bdf8; height: 4px; }

        /* أزرار علوية هندسية ناصعة */
        .icon-btn { background: #0f0f12; border: 1px solid #23232a; color: #ffffff; width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .icon-btn:disabled { opacity: 0.25; cursor: not-allowed; }
        .icon-btn svg { width: 16px; height: 16px; fill: currentColor; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="brand">محرك الفرش <span>الذكي</span></div>
        <div class="top-actions">
            <button class="icon-btn" id="undoBtn" title="تراجع"><svg viewBox="0 0 24 24"><path d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/></svg></button>
            <button class="icon-btn" id="redoBtn" title="إعادة"><svg viewBox="0 0 24 24"><path d="M18.4 10.6C16.55 8.99 14.15 8 11.5 8c-4.65 0-8.58 3.03-9.96 7.22L3.92 16c1.05-3.19 4.06-5.5 7.58-5.5 1.96 0 3.73.72 5.12 1.88L13 16h9V7l-3.6 3.6z"/></svg></button>
            <button class="icon-btn" id="clearBtn" style="color: #ef4444;" title="مسح اللوحة"><svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button>
        </div>
    </div>

    <div class="workspace" id="workspace">
        <div class="canvas-transform-viewport" id="transformViewport">
            <div class="canvas-container" id="canvasContainer">
                <canvas id="paintCanvas"></canvas>
            </div>
        </div>

        <div class="sliders-overlay">
            <div class="slider-item">
                <span>الحجم</span>
                <input type="range" id="brushSize" min="1" max="120" value="15">
            </div>
            <div class="slider-item">
                <span>العتامة</span>
                <input type="range" id="brushOpacity" min="1" max="100" value="100">
            </div>
        </div>

        <div class="tools-popup-panel" id="toolsPopup">
            <button class="tool-row active" data-tool="brush"><svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25z"/></svg><span>فرشاة رسم</span></button>
            <button class="tool-row" data-tool="eraser"><svg viewBox="0 0 24 24"><path d="M14.22 2.78l8.5 8.5c.78.78.78 2.05 0 2.83l-7.72 7.72c-.78.78-2.05.78-2.83 0l-8.5-8.5c-.78-.78-.78-2.05 0-2.83l7.72-7.72c.78-.78 2.05-.78 2.83 0z"/></svg><span>ممحاة</span></button>
            <button class="tool-row" data-tool="bucket"><svg viewBox="0 0 24 24"><path d="M12 22c5.52 0 10-4.48 10-10S17.52 2 12 2 2 6.48 2 12s4.48 10 10 10z"/></svg><span>دلو التعبئة</span></button>
            <button class="tool-row" data-tool="picker"><svg viewBox="0 0 24 24"><path d="M17.71 6.15l-1.86-1.86c-.39-.39-1.02-.39-1.41 0L11.58 7.15l1.86 1.86 2.86-2.86zm-7.57 3.14L3 16.42V21h4.58l7.13-7.13-4.57-4.58z"/></svg><span>التقاط لون</span></button>
        </div>

        <div class="brushes-popup-panel" id="brushesPopup">
            <div class="brushes-header">مكتبة الفرش الشاملة الاحترافية</div>
            <div class="brushes-tabs">
                <button class="tab-btn active" data-cat="basic">الأساسية</button>
                <button class="tab-btn" data-cat="water">ألوان مائية</button>
                <button class="tab-btn" data-cat="wet">طلاء رطب</button>
                <button class="tab-btn" data-cat="chalk">طباشير وفحم</button>
            </div>
            <div class="brushes-list" id="brushesList">
                </div>
        </div>

        <div class="color-panel" id="colorPanel">
            <div class="wheel-container">
                <canvas id="hueCanvas" width="200" height="200"></canvas>
                <canvas id="slCanvas" width="130" height="130"></canvas>
                <div class="wheel-picker" id="huePicker"></div>
                <div class="wheel-picker" id="slPicker"></div>
            </div>
            <div class="color-preview-row">
                <div class="color-box" id="colorBoxPreview"></div>
                <div class="color-hex-text" id="colorHexText">#38BDF8</div>
            </div>
        </div>
    </div>

    <div class="bottom-bar">
        <button class="bottom-btn" id="toggleToolsBtn"><svg viewBox="0 0 24 24"><path d="M7 14c-1.66 0-3 1.34-3 3 0 1.31-1.16 2-2 2 .92.78 2.4 1 3 1 2.21 0 4-1.79 4-4 0-1.66-1.34-3-3-3z"/></svg><span>الأدوات</span></button>
        <button class="bottom-btn" id="toggleBrushesBtn"><svg viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9 0 2.12.74 4.07 1.97 5.61L4.35 19.4c-.39.39-.39 1.02 0 1.41.39.39 1.02.39 1.41 0l1.9-1.9C9.22 19.58 10.57 20 12 20c4.97 0 9-4.03 9-9s-4.03-9-9-9zm0 15c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6z"/></svg><span>الفرش</span></button>
        <button class="bottom-btn" id="toggleColorBtn"><svg viewBox="0 0 24 24"><path d="M12 2C6.49 2 2 6.49 2 12s4.49 10 10 10 10-4.49 10-10S17.51 2 12 2z"/></svg><span>الألوان</span></button>
    </div>

    <script>
        const workspace = document.getElementById('workspace');
        const transformViewport = document.getElementById('transformViewport');
        const canvasContainer = document.getElementById('canvasContainer');
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        const targetWidth = 1000;
        const targetHeight = 1000;
        const dpr = window.devicePixelRatio || 2;

        canvasContainer.style.width = targetWidth + 'px';
        canvasContainer.style.height = targetHeight + 'px';
        canvas.width = targetWidth * dpr;
        canvas.height = targetHeight * dpr;
        ctx.scale(dpr, dpr);

        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, targetWidth, targetHeight);

        // متغيرات الحركة المرنة باللمس المتعدد للإصبعين (Pan, Zoom, Rotate)
        let viewScale = 0.8;
        let viewRotation = 0;
        let viewPosX = 0;
        let viewPosY = 0;

        let activeTool = 'brush';
        let isPainting = false;
        let points = [];
        let selectedColor = '#38bdf8';

        let undoStack = [];
        let redoStack = [];

        // 📋 قاعدة البيانات الكاملة لجميع الفرش المطلوبة من الصور والفرش الإضافية المتقدمة
        const brushesDatabase = {
            basic: [
                { id: 'airbrush', name: 'Airbrush Soft', desc: 'رشاش ناعم متدرج الأطراف لتظليل البشرة والوجوه' },
                { id: 'basic1', name: 'Basic-1 Pen', desc: 'قلم صلب حاد الأطراف للرسم الأولي والإنكلاينر' },
                { id: 'basic2', name: 'Basic-2 Opacity', desc: 'قلم انسيابي يعتمد على خفة وضغط اليد باللمس' },
                { id: 'basic3', name: 'Basic-3 Flow', desc: 'فرشاة تعبئة متتابعة التدفق لبناء كتل التلوين' },
                { id: 'basic4', name: 'Basic-4 Flow Opacity', desc: 'مزيج فخم للدمج الرقمي الحركي المستمر' },
                { id: 'basic5', name: 'Basic-5 Size Default', desc: 'فرشاة الخطوط اليبانية الكلاسيكية المتفاوتة الحجم' },
                { id: 'basic6', name: 'Basic-6 Details', desc: 'قلم رفيع وحاد جداً مخصص لتفاصيل العين والشعر الدقيقة' }
            ],
            water: [
                { id: 'wfringe', name: 'Watercolor Fringe', desc: 'ألوان مائية بحواف داكنة تحاكي جفاف الماء الحقيقي على الورق' },
                { id: 'wtexture', name: 'Watercolor Texture', desc: 'فرشاة مائية مشبعة بنسيج خشن ممتاز للرسم الكلاسيكي' },
                { id: 'whard', name: 'Waterpaint Hard Edges', desc: 'تلوين مائي حاد الأطراف لبناء طبقات تظليل كرتونية مميزة' },
                { id: 'wsoft', name: 'Waterpaint Soft Edges', desc: 'فرشاة مائية ناعمة وسلسة لدمج الطبيعة والغيوم والخلفيات' }
            ],
            wet: [
                { id: 'wbristles', name: 'Wet Bristles', desc: 'فرشاة زيتية رطبة بشعيرات تلوين حية متوازية' },
                { id: 'wbristlesrough', name: 'Wet Bristles Rough', desc: 'شعيرات خشنة ومبعثرة لإعطاء ملمس زيتي بارز وثقيل' },
                { id: 'wcircle', name: 'Wet Circle Pen', desc: 'قلم رطب دائري رائع لرسم ملامح سائل الإضاءة اللامع' },
                { id: 'wknife', name: 'Wet Palette Knife', desc: 'سكين المزج والتلوين الزيتي لخلط المساحات ببعضها' },
                { id: 'wdetails', name: 'Wet Paint Details', desc: 'فرشاة زيتية دقيقة لرسم لوحات المناظر الطبيعية الكلاسيكية' },
                { id: 'wsmear', name: 'Wet Smear Paint', desc: 'فرشاة تلطيخ وسحب الألوان الرطبة المحيطة بمرونة تامة' }
            ],
            chalk: [
                { id: 'cdetails', name: 'Chalk Details', desc: 'طباشير ناعم ومحدد لرسم تفاصيل حواف الملابس والورود' },
                { id: 'cgrainy', name: 'Chalk Grainy', desc: 'طباشير خشن وحبيبي ممتع للتظليل المعماري والأثري' },
                { id: 'csoft', name: 'Chalk Soft Textured', desc: 'بودرة طباشير ناعمة لعمل تأثيرات الغبار أو الإضاءات السحرية' },
                { id: 'charcoal_l', name: 'Charcoal Pencil Large', desc: 'فحم عريض لتظليل المساحات الكبرى في الاسكتشات السريعة' },
                { id: 'charcoal_m', name: 'Charcoal Pencil Medium', desc: 'قلم فحم متوسط لرسم الظلال النصفية والملامح العامة' },
                { id: 'charcoal_t', name: 'Charcoal Pencil Thin', desc: 'قلم فحم رفيع مدبب لمحاكاة أطراف وقلم رصاص التخطيط' }
            ]
        };

        let currentSelectedBrushId = 'basic1';

        function saveCanvasState() {
            if (undoStack.length >= 20) undoStack.shift();
            undoStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
            redoStack = [];
            updateUndoRedoButtons();
        }

        function updateUndoRedoButtons() {
            document.getElementById('undoBtn').disabled = undoStack.length === 0;
            document.getElementById('redoBtn').disabled = redoStack.length === 0;
        }

        document.getElementById('undoBtn').addEventListener('click', () => {
            if (undoStack.length > 0) {
                redoStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
                ctx.putImageData(undoStack.pop(), 0, 0);
                updateUndoRedoButtons();
            }
        });

        document.getElementById('redoBtn').addEventListener('click', () => {
            if (redoStack.length > 0) {
                undoStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
                ctx.putImageData(redoStack.pop(), 0, 0);
                updateUndoRedoButtons();
            }
        });

        document.getElementById('clearBtn').addEventListener('click', () => {
            saveCanvasState();
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, targetWidth, targetHeight);
        });

        function applyViewportTransform() {
            transformViewport.style.transform = `translate(${viewPosX}px, ${viewPosY}px) scale(${viewScale}) rotate(${viewRotation}deg)`;
        }
        applyViewportTransform();

        // 📱 نظام معالجة الإيماءات المتقدم باللمس المتعدد (Pinch To Zoom & Rotate المرن بالإصبعين)
        let touchStartDist = 0;
        let touchStartAngle = 0;
        let touchStartScale = 1;
        let touchStartRotation = 0;
        let isMultiTouch = false;

        workspace.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                isMultiTouch = true;
                isPainting = false;
                points = [];
                const t1 = e.touches[0];
                const t2 = e.touches[1];
                touchStartDist = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
                touchStartAngle = Math.atan2(t2.clientY - t1.clientY, t2.clientX - t1.clientX) * 180 / Math.PI;
                touchStartScale = viewScale;
                touchStartRotation = viewRotation;
            } else if (e.touches.length === 1 && !isMultiTouch) {
                handlePaintStart(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, { passive: false });

        workspace.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2 && isMultiTouch) {
                e.preventDefault();
                const t1 = e.touches[0];
                const t2 = e.touches[1];
                
                const currentDist = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
                viewScale = Math.max(0.2, Math.min(6.0, touchStartScale * (currentDist / touchStartDist)));

                const currentAngle = Math.atan2(t2.clientY - t1.clientY, t2.clientX - t1.clientX) * 180 / Math.PI;
                viewRotation = touchStartRotation + (currentAngle - touchStartAngle);

                applyViewportTransform();
            } else if (e.touches.length === 1 && !isMultiTouch && isPainting) {
                e.preventDefault();
                handlePaintMove(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, { passive: false });

        workspace.addEventListener('touchend', () => { isMultiTouch = false; if (isPainting) handlePaintEnd(); });

        // التوافقية الشاملة مع الماوس
        workspace.addEventListener('mousedown', (e) => { if (e.button === 0) handlePaintStart(e.clientX, e.clientY); });
        workspace.addEventListener('mousemove', (e) => { if (isPainting) handlePaintMove(e.clientX, e.clientY); });
        workspace.addEventListener('mouseup', () => { if (isPainting) handlePaintEnd(); });

        function getCanvasSpaceCoordinates(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            let relX = clientX - centerX;
            let relY = clientY - centerY;

            const rad = (-viewRotation * Math.PI) / 180;
            const rotX = relX * Math.cos(rad) - relY * Math.sin(rad);
            const rotY = relX * Math.sin(rad) + relY * Math.cos(rad);

            return {
                x: rotX / (rect.width / targetWidth) + targetWidth / 2,
                y: rotY / (rect.height / targetHeight) + targetHeight / 2
            };
        }

        function handlePaintStart(clientX, clientY) {
            const pos = getCanvasSpaceCoordinates(clientX, clientY);
            if (activeTool === 'picker') { pickColorAtPoint(pos.x, pos.y); return; }
            if (activeTool === 'bucket') { saveCanvasState(); executeFloodFill(Math.floor(pos.x), Math.floor(pos.y), selectedColor); return; }

            isPainting = true;
            saveCanvasState();
            points = [pos];
        }

        function handlePaintMove(clientX, clientY) {
            if (!isPainting) return;
            const pos = getCanvasSpaceCoordinates(clientX, clientY);
            points.push(pos);

            if (points.length > 1) {
                const p1 = points[points.length - 2];
                const p2 = points[points.length - 1];
                
                const baseSize = parseFloat(document.getElementById('brushSize').value);
                const opacity = parseFloat(document.getElementById('brushOpacity').value) / 100;

                ctx.save();
                if (activeTool === 'eraser') {
                    ctx.globalCompositeOperation = 'destination-out';
                    ctx.strokeStyle = `rgba(0,0,0,${opacity})`;
                    drawEngineStandard(p1, p2, baseSize, opacity);
                } else {
                    ctx.globalCompositeOperation = 'source-over';
                    // 🚀 تشغيل محاكاة ضربة الفرشاة المحددة بناءً على هويتها ونوعها المختار من القائمة
                    executeSelectedBrushStyle(p1, p2, baseSize, opacity);
                }
                ctx.restore();
            }
        }

        function handlePaintEnd() { isPainting = false; points = []; }

        // ✨ محرك الفرش المتقدم - يعطي كل اسم فرشاة مظهرها وتأثيرها الدقيق والملموس
        function executeSelectedBrushStyle(p1, p2, size, opacity) {
            const hexColor = selectedColor;
            
            switch (currentSelectedBrushId) {
                case 'airbrush': // بخاخ ناعم متدرج جداً
                    let grad = ctx.createRadialGradient(p2.x, p2.y, 0, p2.x, p2.y, size * 1.5);
                    grad.addColorStop(0, convertHexToRgbA(hexColor, opacity));
                    grad.addColorStop(1, convertHexToRgbA(hexColor, 0));
                    ctx.fillStyle = grad;
                    ctx.beginPath(); ctx.arc(p2.x, p2.y, size * 1.5, 0, Math.PI*2); ctx.fill();
                    break;

                case 'basic1': // قلم حاد وصلب
                    ctx.strokeStyle = convertHexToRgbA(hexColor, opacity);
                    ctx.lineWidth = size; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                    ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
                    break;

                case 'basic5': // فرشاة خط مدبب الأطراف تبعا للسرعة
                    ctx.strokeStyle = convertHexToRgbA(hexColor, opacity);
                    ctx.lineWidth = size * 0.7; ctx.lineCap = 'round';
                    ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
                    break;

                case 'wfringe': // ألوان مائية ذات حواف مجففة داكنة (Fringe Effect)
                    ctx.strokeStyle = convertHexToRgbA(hexColor, opacity * 0.4);
                    ctx.lineWidth = size; ctx.lineCap = 'round';
                    ctx.shadowBlur = 2; ctx.shadowColor = convertHexToRgbA(hexColor, opacity);
                    ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
                    break;

                case 'wtexture': // فرشاة مائية ذات قوام ورقي متقطع
                case 'cgrainy':  // طباشير خشن ذو حبيبات متباعدة
                    ctx.fillStyle = convertHexToRgbA(hexColor, opacity);
                    const distance = Math.hypot(p2.x - p1.x, p2.y - p1.y);
                    const steps = Math.max(1, distance / 2);
                    for(let j=0; j<steps; j++) {
                        const t = j / steps;
                        const x = p1.x + (p2.x - p1.x) * t;
                        const y = p1.y + (p2.y - p1.y) * t;
                        // توزيع نقاط عشوائية بقطر الحجم لمحاكاة النسيج
                        for(let p=0; p<6; p++) {
                            const r = (Math.random() - 0.5) * size;
                            const a = Math.random() * Math.PI * 2;
                            ctx.fillRect(x + r*Math.cos(a), y + r*Math.sin(a), 2, 2);
                        }
                    }
                    break;

                case 'wbristles': // شعيرات الطلاء الزيتي الرطب المتوازية
                    ctx.strokeStyle = convertHexToRgbA(hexColor, opacity * 0.7);
                    ctx.lineCap = 'round';
                    const offsetRange = size * 0.4;
                    for (let i = -3; i <= 3; i++) {
                        ctx.lineWidth = size * 0.15;
                        const offset = (i / 3) * offsetRange;
                        ctx.beginPath(); 
                        ctx.moveTo(p1.x + offset, p1.y + offset); 
                        ctx.lineTo(p2.x + offset, p2.y + offset); 
                        ctx.stroke();
                    }
                    break;

                case 'charcoal_t': // قلم فحم رفيع ومتشظي وخفيف
                case 'charcoal_m':
                    ctx.strokeStyle = convertHexToRgbA(hexColor, opacity * 0.5);
                    ctx.lineWidth = currentSelectedBrushId === 'charcoal_t' ? size * 0.3 : size * 0.7;
                    ctx.lineCap = 'square';
                    ctx.beginPath(); ctx.moveTo(p1.x + (Math.random()-0.5)*3, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
                    break;

                default: // النمط العام القياسي لبقية الفرش المضافة
                    drawEngineStandard(p1, p2, size, opacity);
                    break;
            }
        }

        function drawEngineStandard(p1, p2, size, opacity) {
            ctx.strokeStyle = convertHexToRgbA(selectedColor, opacity);
            ctx.lineWidth = size;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.stroke();
        }

        function convertHexToRgbA(hex, opacity) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r},${g},${b},${opacity})`;
        }

        function pickColorAtPoint(x, y) {
            const imgData = ctx.getImageData(x * dpr, y * dpr, 1, 1).data;
            if (imgData[3] === 0) return;
            const r = imgData[0].toString(16).padStart(2, '0');
            const g = imgData[1].toString(16).padStart(2, '0');
            const b = imgData[2].toString(16).padStart(2, '0');
            updateGlobalColor(`#${r}${g}${b}`);
        }

        function updateGlobalColor(hex) {
            selectedColor = hex;
            document.getElementById('colorBoxPreview').style.backgroundColor = hex;
            document.getElementById('colorHexText').innerText = hex.toUpperCase();
        }

        function executeFloodFill(startX, startY, fillHex) {
            const w = canvas.width; const h = canvas.height;
            const imgData = ctx.getImageData(0, 0, w, h); const data = imgData.data;
            const sX = Math.floor(startX * dpr); const sY = Math.floor(startY * dpr);
            if(sX < 0 || sX >= w || sY < 0 || sY >= h) return;
            const targetR = parseInt(fillHex.slice(1,3), 16); const targetG = parseInt(fillHex.slice(3,5), 16); const targetB = parseInt(fillHex.slice(5,7), 16);
            const startIdx = (sY * w + sX) * 4;
            const startR = data[startIdx]; const startG = data[startIdx+1]; const startB = data[startIdx+2]; const startA = data[startIdx+3];
            if (startR === targetR && startG === targetG && startB === targetB) return;
            const queue = [[sX, sY]];
            while(queue.length > 0) {
                const [cx, cy] = queue.pop(); const idx = (cy * w + cx) * 4;
                if(data[idx] === startR && data[idx+1] === startG && data[idx+2] === startB && data[idx+3] === startA) {
                    data[idx] = targetR; data[idx+1] = targetG; data[idx+2] = targetB; data[idx+3] = 255;
                    if(cx > 0) queue.push([cx - 1, cy]); if(cx < w - 1) queue.push([cx + 1, cy]);
                    if(cy > 0) queue.push([cx, cy - 1]); if(cy < h - 1) queue.push([cx, cy + 1]);
                }
            }
            ctx.putImageData(imgData, 0, 0);
        }

        // 🎨 إدارة عجلة وتناغم الألوان الاحترافية الدائرية مع المربع الماسي الداخلي لـ ibis Paint
        const hueCanvas = document.getElementById('hueCanvas'); const hueCtx = hueCanvas.getContext('2d');
        const slCanvas = document.getElementById('slCanvas'); const slCtx = slCanvas.getContext('2d');
        let currentHue = 200;

        function renderHueWheel() {
            const r = hueCanvas.width / 2; hueCtx.clearRect(0,0,hueCanvas.width,hueCanvas.height);
            for(let angle=0; angle<360; angle++) {
                const startRad = (angle - 0.5) * Math.PI / 180; const endRad = (angle + 0.5) * Math.PI / 180;
                hueCtx.beginPath(); hueCtx.moveTo(r, r); hueCtx.arc(r, r, r, startRad, endRad); hueCtx.closePath();
                hueCtx.fillStyle = `hsl(${angle}, 100%, 50%)`; hueCtx.fill();
            }
            hueCtx.globalCompositeOperation = 'destination-out'; hueCtx.beginPath(); hueCtx.arc(r, r, r - 20, 0, Math.PI * 2); hueCtx.fill();
            hueCtx.globalCompositeOperation = 'source-over';
        }

        function renderSquareSL(hue) {
            const w = slCanvas.width; const h = slCanvas.height;
            for(let x=0; x<w; x++) {
                for(let y=0; y<h; y++) {
                    slCtx.fillStyle = `hsl(${hue}, ${(x/w)*100}%, ${(1-(y/h))*100}%)`;
                    slCtx.fillRect(x, y, 1, 1);
                }
            }
        }

        function initColorPickers() {
            renderHueWheel(); renderSquareSL(currentHue);
            hueCanvas.addEventListener('pointerdown', handleHuePick);
            hueCanvas.addEventListener('pointermove', (e) => { if(e.buttons === 1) handleHuePick(e); });
            slCanvas.addEventListener('pointerdown', handleSLPick);
            slCanvas.addEventListener('pointermove', (e) => { if(e.buttons === 1) handleSLPick(e); });
        }

        function handleHuePick(e) {
            const rect = hueCanvas.getBoundingClientRect();
            const x = e.clientX - rect.left - rect.width/2; const y = e.clientY - rect.top - rect.height/2;
            let angle = Math.atan2(y, x) * 180 / Math.PI; if(angle < 0) angle += 360;
            currentHue = Math.floor(angle);
            const rad = angle * Math.PI / 180;
            document.getElementById('huePicker').style.left = (rect.width/2 + (rect.width/2 - 10) * Math.cos(rad)) + 'px';
            document.getElementById('huePicker').style.top = (rect.height/2 + (rect.height/2 - 10) * Math.sin(rad)) + 'px';
            renderSquareSL(currentHue);
        }

        function handleSLPick(e) {
            const rect = slCanvas.getBoundingClientRect();
            const x = Math.max(0, Math.min(rect.width, e.clientX - rect.left));
            const y = Math.max(0, Math.min(rect.height, e.clientY - rect.top));
            document.getElementById('slPicker').style.left = (x + 35) + 'px'; document.getElementById('slPicker').style.top = (y + 35) + 'px';
            const hex = hslToHex(currentHue, (x / rect.width) * 100, (1 - (y / rect.height)) * 100);
            updateGlobalColor(hex);
        }

        function hslToHex(h, s, l) {
            l /= 100; const a = s * Math.min(l, 1 - l) / 100;
            const f = n => { const k = (n + h / 30) % 12; return Math.round(255 * (l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1))).toString(16).padStart(2, '0'); };
            return `#${f(0)}${f(4)}${f(8)}`;
        }

        // 🛠️ توليد وإدارة واجهة الفرش التفاعلية المقسمة إلى فئات الصور المرفوعة
        const brushesListContainer = document.getElementById('brushesList');
        const tabButtons = document.querySelectorAll('.tab-btn');

        function renderBrushesForCategory(category) {
            brushesListContainer.innerHTML = '';
            brushesDatabase[category].forEach(brush => {
                const item = document.createElement('div');
                item.className = `brush-item ${brush.id === currentSelectedBrushId ? 'active' : ''}`;
                item.innerHTML = `<div><div class="brush-name">${brush.name}</div><div class="brush-desc">${brush.desc}</div></div>`;
                item.addEventListener('click', () => {
                    document.querySelectorAll('.brush-item').forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    currentSelectedBrushId = brush.id;
                    document.getElementById('brushesPopup').classList.remove('show');
                });
                brushesListContainer.appendChild(item);
            });
        }

        tabButtons.forEach(tab => {
            tab.addEventListener('click', () => {
                tabButtons.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                renderBrushesForCategory(tab.getAttribute('data-cat'));
            });
        });

        // تشغيل النوافذ والأزرار السفلية بمرونة كاملة تمنع التداخل
        const toggleToolsBtn = document.getElementById('toggleToolsBtn');
        const toolsPopup = document.getElementById('toolsPopup');
        const toggleBrushesBtn = document.getElementById('toggleBrushesBtn');
        const brushesPopup = document.getElementById('brushesPopup');
        const toggleColorBtn = document.getElementById('toggleColorBtn');
        const colorPanel = document.getElementById('colorPanel');

        toggleToolsBtn.addEventListener('click', (e) => { e.stopPropagation(); hideAllPanels(); toolsPopup.classList.toggle('show'); });
        toggleBrushesBtn.addEventListener('click', (e) => { e.stopPropagation(); hideAllPanels(); renderBrushesForCategory(document.querySelector('.tab-btn.active').getAttribute('data-cat')); brushesPopup.classList.toggle('show'); });
        toggleColorBtn.addEventListener('click', (e) => { e.stopPropagation(); hideAllPanels(); colorPanel.classList.toggle('show'); });

        function hideAllPanels() {
            toolsPopup.classList.remove('show');
            brushesPopup.classList.remove('show');
            colorPanel.classList.remove('show');
        }

        document.querySelectorAll('.tool-row').forEach(row => {
            row.addEventListener('click', () => {
                document.querySelectorAll('.tool-row').forEach(r => r.classList.remove('active'));
                row.classList.add('active');
                activeTool = row.getAttribute('data-tool');
                hideAllPanels();
            });
        });

        workspace.addEventListener('click', (e) => { if(e.target.id === 'workspace' || e.target.id === 'paintCanvas') hideAllPanels(); });

        // إطلاق التطبيق
        initColorPickers();
        renderBrushesForCategory('basic');
    </script>
</body>
</html>
