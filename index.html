<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لعبة الأسماء الإيمانية</title>
    <style>
        body { transition: background 0.5s; font-family: sans-serif; text-align: center; padding: 20px; color: white; margin: 0; }
        .card { background: rgba(0,0,0,0.3); padding: 20px; border-radius: 20px; backdrop-filter: blur(10px); }
        
        /* تصميم اللافتة الكبيرة (الخصوصية) */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a2e; display: none; justify-content: center;
            align-items: center; flex-direction: column; z-index: 1000;
        }
        
        input, button { width: 90%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; font-size: 18px; }
        button { background: #4ecca3; cursor: pointer; font-weight: bold; }
        
        #result-text { font-size: 32px; font-weight: bold; margin-bottom: 30px; }
    </style>
</head>
<body style="background-color: #1a1a2e;">

    <div class="card">
        <h1>إعدادات الجولة</h1>
        <input type="text" id="names" placeholder="الأسماء (سارة, مريم, ...)">
        <input type="text" id="target" placeholder="اسم الله المختار">
        <button onclick="startGame()">تجهيز الجولة</button>
        <button onclick="changeTheme()" style="background: #e94560;">تغيير الخلفية</button>
        <div id="historyBox" style="font-size: 14px; margin-top: 20px;">السجل: لم يبدأ بعد</div>
    </div>

    <div id="overlay">
        <h2 id="turn-name">---</h2>
        <div id="result-text">---</div>
        <button onclick="closeOverlay()" style="background: #ffffff; color: #1a1a2e;">تم (إخفاء)</button>
    </div>

    <script>
        let roles = [], currentIndex = 0;

        function startGame() {
            let names = document.getElementById('names').value.split(',').map(n => n.trim());
            let target = document.getElementById('target').value;
            let spyIdx = Math.floor(Math.random() * names.length);
            roles = names.map((n, i) => ({ name: n, role: (i === spyIdx ? "أنتِ الدخيلة!" : target) }));
            currentIndex = 0;
            document.getElementById('historyBox').innerText = "تم التجهيز، اضغطي هنا للبدء:";
            
            // إضافة زر البدء بعد التجهيز
            let btn = document.createElement("button");
            btn.innerText = "كشف الدور للاعبة التالية";
            btn.onclick = showNext;
            document.querySelector('.card').appendChild(btn);
        }

        function showNext() {
            if (currentIndex < roles.length) {
                let p = roles[currentIndex];
                document.getElementById('turn-name').innerText = "دور الأخت: " + p.name;
                document.getElementById('result-text').innerText = p.role;
                document.getElementById('overlay').style.display = "flex";
                
                document.getElementById('historyBox').innerText = "اللاعبات اللواتي انتهى دورهن: " + (currentIndex + 1);
            }
        }

        function closeOverlay() {
            document.getElementById('overlay').style.display = "none";
            currentIndex++;
        }

        function changeTheme() {
            const colors = ["#1a1a2e", "#2c3e50", "#4a148c", "#1b5e20"];
            document.body.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        }
    </script>
</body>
</html>
