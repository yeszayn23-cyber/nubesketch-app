<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nubesketsh | Professional Sketching</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* CSS العملاق - اختصار لضمان التنسيق */
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: white; }
        .hidden { display: none; }
        .page { height: 100vh; overflow-y: auto; padding-bottom: 70px; }
        
        /* الهيدر والترس */
        .header { display: flex; justify-content: space-between; padding: 15px; align-items: center; }
        
        /* لوحة الرسم */
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; z-index: 1000; }
        .toolbar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; background: rgba(255,255,255,0.1); padding: 10px; border-radius: 20px; }
        
        /* البروفايل */
        .profile-header { text-align: center; padding: 20px; }
        .star-badge { color: gold; font-size: 20px; }
        
        /* ناف بار */
        .navbar { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; }
    </style>
</head>
<body>

<!-- واجهة التطبيق -->
<div id="app">
    <header class="header">
        <div id="app-title">Nubesketsh</div>
        <div onclick="toggleSettings()">⚙️</div>
    </header>

    <div id="main-feed" class="page">
        <!-- هنا سيتم تحميل بوستات المستخدمين -->
        <div id="feed-content"></div>
    </div>

    <nav class="navbar">
        <div onclick="showPage('home')">🏠</div>
        <div onclick="showPage('search')">🔍</div>
        <div id="add-design-btn" onclick="openCanvas()" style="font-size: 30px; color: #ff0050;">+</div>
        <div onclick="showPage('messages')">✉️</div>
        <div onclick="showPage('profile')">👤</div>
    </nav>
</div>

<!-- صفحة الرسم -->
<div id="canvas-container" class="hidden">
    <button onclick="closeCanvas()">إغلاق</button>
    <canvas id="main-canvas"></canvas>
    <div class="toolbar">
        <button onclick="setMode('pencil')">✏️</button>
        <button onclick="openModels()">Model 💃</button>
        <button onclick="saveSketch()">Save</button>
    </div>
</div>

<script>
    // 1. الإعدادات والتوكن (يجب أن يكون مخفياً في الإنتاج)
    const BOT_TOKEN = "8445689083:AAEJXtmQzemnxDhpggr9IhH9UKKn221mdiM";
    let lang = 'ar';
    let userStats = { sketches: 0, visitors: 0 };

    // 2. نظام اللغة
    const dict = {
        ar: { home: "الرئيسية", add: "إضافة تصميم", save: "حفظ" },
        en: { home: "Home", add: "Add design", save: "Save" }
    };

    // 3. منطق الرسم (Canvas Engine)
    const canvas = document.getElementById('main-canvas');
    const ctx = canvas.getContext('2d');
    
    function initCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    function openCanvas() {
        document.getElementById('canvas-container').classList.remove('hidden');
        initCanvas();
    }

    function closeCanvas() {
        document.getElementById('canvas-container').classList.add('hidden');
    }

    // 4. نظام الموديلات (عارضات أزياء)
    function openModels() {
        const pose = prompt("اختاري الوضعية: (1: وقوف، 2: جلوس، 3: عارضة أزياء)");
        // هنا يتم تحميل صورة العارضة كطبقة خلفية
        alert("تم تحميل العارضة " + pose);
    }

    // 5. الربط مع التلجرام
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // 6. نظام النجوم (Gamification)
    function checkBadge(count) {
        if (count >= 20) return "🌟";
        if (count >= 10) return "⭐";
        return "";
    }

    // 7. إعدادات الأدمن
    function toggleSettings() {
        const isAdmin = true; // منطق للتحقق من هوية Hoda
        if(isAdmin) {
            alert("لوحة تحكم الأدمن: تغيير الخلفية، عرض سجل الدخول");
        }
    }

    console.log("Nubesketsh Initialized...");
</script>
</body>
</html>
