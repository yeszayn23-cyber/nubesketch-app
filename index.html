<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NUBESKETSH PRO</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <header class="main-header">
        <div class="logo">NUBESKETSH</div>
        <button class="settings-trigger" onclick="openSettings()">⚙️</button>
    </header>

    <main id="app-container">
        <div id="studio-view" class="active">
            <canvas id="canvas"></canvas>
            <div class="studio-toolbar">
                <div class="tool-icon" onclick="setTool('pen', 5)">✏️</div>
                <div class="tool-icon" onclick="setTool('eraser', 20)">🧽</div>
                <input type="color" onchange="updateColor(this.value)">
                <div class="tool-icon" onclick="alert('Model Poses Coming Soon')">💃</div>
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <button class="nav-btn" onclick="switchView('home')">الرئيسية</button>
        <button class="nav-btn" onclick="switchView('ranking')">الترتيب</button>
        <button class="nav-btn-add" onclick="switchView('studio')">+</button>
        <button class="nav-btn" onclick="switchView('messages')">الرسائل</button>
    </nav>

    <script src="script.js"></script>
</body>
</html>
