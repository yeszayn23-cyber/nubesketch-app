<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لعبة الأسماء</title>
    <style>
        body { background: #1a1a2e; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #16213e; padding: 20px; border-radius: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        input, button { width: 90%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; }
        button { background: #4ecca3; font-weight: bold; cursor: pointer; }
        #result { font-size: 24px; color: #4ecca3; margin: 20px 0; min-height: 50px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>إعدادات الجولة</h1>
        <input type="text" id="names" placeholder="أدخلي الأسماء مفصولة بفاصلة (زينب, مريم, ...)">
        <input type="text" id="target" placeholder="اسم الله المختار">
        <button onclick="startGame()">تجهيز الجولة</button>

        <div id="result">---</div>
        <button onclick="nextPlayer()" id="nextBtn" style="display:none;">كشف الدور للاعبة التالية</button>
    </div>

    <script>
        let playersList = [];
        let targetName = "";
        let roles = [];
        let currentIndex = 0;

        function startGame() {
            let namesInput = document.getElementById('names').value;
            targetName = document.getElementById('target').value;
            playersList = namesInput.split(',').map(name => name.trim());
            
            // توزيع الأدوار
            let spyIndex = Math.floor(Math.random() * playersList.length);
            roles = playersList.map((name, index) => {
                return { name: name, role: (index === spyIndex ? "أنتِ الدخيلة!" : targetName) };
            });
            
            currentIndex = 0;
            document.getElementById('result').innerText = "تم التجهيز! ابدئي بالضغط على كشف الدور.";
            document.getElementById('nextBtn').style.display = "block";
        }

        function nextPlayer() {
            if (currentIndex < roles.length) {
                let p = roles[currentIndex];
                alert("أعطي الهاتف لـ: " + p.name);
                document.getElementById('result').innerText = p.role;
                currentIndex++;
            } else {
                document.getElementById('result').innerText = "انتهت الجولة! ابدئي اللعب.";
                document.getElementById('nextBtn').style.display = "none";
            }
        }
    </script>
</body>
</html>
