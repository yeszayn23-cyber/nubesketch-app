<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NubeSketch - Pro Studio</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; }
        body { background: #121212; color: #FFF; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
        
        /* شريط الأدوات العلوي */
        .toolbar { width: 100%; padding: 12px; background: #1a1a1a; display: flex; gap: 10px; align-items: center; border-bottom: 1px solid #d4af37; overflow-x: auto; }
        .tool-select, .btn { background: #262626; color: #d4af37; border: 1px solid #d4af37; padding: 8px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .btn.active { background: #d4af37; color: #121212; }
        .color-picker { width: 40px; height: 40px; border: 2px solid #d4af37; border-radius: 50%; cursor: pointer; padding: 0; background: none; }
        .size-slider { width: 100px; accent-color: #d4af37; }

        /* منطقة الرسم */
        .canvas-container { position: relative; margin-top: 10px; box-shadow: 0 4px 25px rgba(0,0,0,0.7); border-radius: 12px; overflow: hidden; }
        canvas { background: #ffffff; display: block; cursor: crosshair; image-rendering: -webkit-optimize-contrast; }
    </style>
</head>
<body>

    <div class="toolbar">
        <!-- عجلة الألوان -->
        <input type="color" id="color" class="color-picker" value="#000000" title="عجلة الألوان">
        
        <!-- اختيار نوع القلم/الفرشاة -->
        <select id="brushType" class="tool-select">
            <option value="pen">قلم حبر حاد</option>
            <option value="brush">فرشاة ناعمة (Airbrush)</option>
            <option value="hair">فرشاة شعر (ملمس شعيرات)</option>
            <option value="fabric">فرشاة قماش (تأثير نسيج)</option>
        </select>

        <!-- حجم الفرشاة -->
        <input type="range" id="size" class="size-slider" min="1" max="50" value="5" title="حجم الفرشاة">

        <!-- الأدوات الثانوية -->
        <button class="btn" id="tool-draw" data-tool="draw">الرسم</button>
        <button class="btn" id="tool-eraser" data-tool="eraser">الممحاة</button>
        <button class="btn" id="tool-bucket" data-tool="bucket">دلو التلوين 🪣</button>
        
        <button class="btn" id="clear" style="margin-right: auto; border-color: #ff4d4d; color: #ff4d4d;">مسح</button>
        <button class="btn" id="share" style="background: #d4af37; color: #121212;">نشر ✨</button>
    </div>

    <div class="canvas-container">
        <canvas id="paintCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        
        canvas.width = window.innerWidth - 20;
        canvas.height = window.innerHeight - 100;

        // تعبئة الخلفية باللون الأبيض كبداية لتسهيل عمل الدلو
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        let painting = false;
        let currentTool = 'draw'; // draw, eraser, bucket
        let lastX = 0, lastY = 0;

        // تفعيل الأزرار وتغيير حالتها
        const tools = document.querySelectorAll('[data-tool]');
        tools.forEach(btn => {
            btn.addEventListener('click', () => {
                tools.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTool = btn.getAttribute('data-tool');
            });
        });
        document.getElementById('tool-draw').classList.add('active');

        // خوارزمية دلو التلوين (Flood Fill) السريعة والخفيفة
        function floodFill(startX, startY, fillColor) {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            
            const targetColor = getPixelColor(data, startX, startY);
            if (colorMatch(targetColor, fillColor)) return;

            const queue = [[startX, startY]];
            while (queue.length > 0) {
                const [x, y] = queue.shift();
                const currentIdx = (y * canvas.width + x) * 4;

                if (colorMatch(getPixelColor(data, x, y), targetColor)) {
                    setPixelColor(data, currentIdx, fillColor);

                    if (x > 0) queue.push([x - 1, y]);
                    if (x < canvas.width - 1) queue.push([x + 1, y]);
                    if (y > 0) queue.push([x, y - 1]);
                    if (y < canvas.height - 1) queue.push([x, y + 1]);
                }
            }
            ctx.putImageData(imageData, 0, 0);
        }

        function getPixelColor(data, x, y) {
            const idx = (y * canvas.width + x) * 4;
            return [data[idx], data[idx+1], data[idx+2], data[idx+3]];
        }

        function setPixelColor(data, idx, color) {
            data[idx] = color[0]; data[idx+1] = color[1]; data[idx+2] = color[2]; data[idx+3] = 255;
        }

        function colorMatch(c1, c2) {
            return c1[0] === c2[0] && c1[1] === c2[1] && c1[2] === c2[2];
        }

        function hexToRgb(hex) {
            const bigint = parseInt(hex.slice(1), 16);
            return [(bigint >> 16) & 255, (bigint >> 8) & 255, bigint & 255];
        }

        // إعدادات ورسم أنواع الفرش الاحترافية
        function drawStyles(x, y) {
            const size = document.getElementById('size').value;
            const color = document.getElementById('color').value;
            const type = document.getElementById('brushType').value;

            ctx.lineWidth = size;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            if (currentTool === 'eraser') {
                ctx.strokeStyle = "#ffffff";
                ctx.shadowBlur = 0;
                ctx.lineTo(x, y);
                ctx.stroke();
            } else if (currentTool === 'draw') {
                ctx.strokeStyle = color;
                
                if (type === 'pen') {
                    ctx.shadowBlur = 0;
                    ctx.lineTo(x, y);
                    ctx.stroke();
                } 
                else if (type === 'brush') {
                    ctx.shadowBlur = size / 2;
                    ctx.shadowColor = color;
                    ctx.lineTo(x, y);
                    ctx.stroke();
                } 
                else if (type === 'hair') {
                    ctx.shadowBlur = 0;
                    // رسم شعيرات متوازية خفيفة وسريعة
                    for (let i = -size/2; i < size/2; i += 4) {
                        ctx.beginPath();
                        ctx.moveTo(lastX + i, lastY + i);
                        ctx.lineTo(x + i, y + i);
                        ctx.stroke();
                    }
                } 
                else if (type === 'fabric') {
                    ctx.shadowBlur = 0;
                    ctx.lineTo(x, y);
                    ctx.stroke();
                    // إضافة ملمس النسيج المتقاطع
                    if (Math.random() > 0.5) {
                        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                        ctx.stroke();
                    }
                }
            }
        }

        // إدارة أحداث الرسم باللمس والفأرة المباشرة والسلسة
        function startPosition(e) {
            const pos = getPos(e);
            if (currentTool === 'bucket') {
                const rgb = hexToRgb(document.getElementById('color').value);
                floodFill(Math.floor(pos.x), Math.floor(pos.y), rgb);
                return;
            }
            painting = true;
            lastX = pos.x; lastY = pos.y;
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
        }

        function endPosition() { painting = false; ctx.beginPath(); }
        
        function movePosition(e) {
            if (!painting || currentTool === 'bucket') return;
            const pos = getPos(e);
            drawStyles(pos.x, pos.y);
            lastX = pos.x; lastY = pos.y;
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        // مستمعات الأحداث (تتحمل الاستجابة السريعة جداً)
        canvas.addEventListener('mousedown', startPosition);
        canvas.addEventListener('mouseup', endPosition);
        canvas.addEventListener('mousemove', movePosition);
        
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startPosition(e); });
        canvas.addEventListener('touchend', endPosition);
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); movePosition(e); });

        document.getElementById('clear').addEventListener('click', () => {
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        });
    </script>
</body>
</html>
