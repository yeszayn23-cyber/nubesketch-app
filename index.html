<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NubeSketch Pro Studio</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; user-select: none; -webkit-user-select: none; }
        body { background: #09090b; color: #f4f4f5; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* شريط علوي احترافي ونحيف */
        .top-bar { height: 50px; background: #18181b; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; border-bottom: 1px solid #27272a; z-index: 10; }
        .brand { font-weight: 800; font-size: 16px; color: #e4e4e7; letter-spacing: 1px; }
        .brand span { color: #d4af37; }
        .top-actions { display: flex; gap: 10px; }

        /* منطقة العمل الكانفاس */
        .workspace { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; background: #111114; }
        canvas { background: #ffffff; box-shadow: 0 10px 30px rgba(0,0,0,0.8); display: block; image-rendering: optimizeSpeed; }

        /* شريط الأدوات السفلي العائم (ستايل ibisPaint) */
        .bottom-nav { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(24, 24, 27, 0.95); backdrop-filter: blur(10px); border: 1px solid #3f3f46; padding: 8px 20px; border-radius: 30px; display: flex; gap: 20px; align-items: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); z-index: 10; }
        .nav-item { background: none; border: none; color: #a1a1aa; font-size: 20px; cursor: pointer; padding: 8px; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
        .nav-item.active { color: #d4af37; transform: scale(1.1); }

        /* اللوحات المنبثقة للأدوات (الألوان والفرش) */
        .panel { position: absolute; bottom: 85px; left: 50%; transform: translateX(-50%); background: #18181b; border: 1px solid #27272a; border-radius: 16px; padding: 15px; width: 280px; box-shadow: 0 20px 40px rgba(0,0,0,0.6); display: none; flex-direction: column; gap: 12px; z-index: 15; }
        .panel.show { display: flex; }
        .panel-title { font-size: 13px; color: #71717a; font-weight: 600; border-bottom: 1px solid #27272a; padding-bottom: 5px; }

        /* تخصيص أدوات الفرش وعجلة الألوان داخل اللوحات */
        .brush-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .brush-option { background: #27272a; border: 1px solid transparent; color: #e4e4e7; padding: 10px; border-radius: 8px; font-size: 12px; cursor: pointer; text-align: center; }
        .brush-option.selected { border-color: #d4af37; color: #d4af37; background: #1e1b12; }
        
        .color-row { display: flex; align-items: center; gap: 10px; }
        .native-picker { width: 45px; height: 45px; border: none; border-radius: 50%; cursor: pointer; background: none; }
        .sliders-container { flex: 1; display: flex; flex-direction: column; gap: 5px; }
        .slider-group { display: flex; align-items: center; gap: 8px; font-size: 11px; color: #a1a1aa; }
        .slider-group input { flex: 1; accent-color: #d4af37; }

        /* أزرار مخصصة فخمة */
        .btn-premium { background: #d4af37; color: #09090b; font-weight: 700; border: none; padding: 6px 16px; border-radius: 20px; font-size: 13px; cursor: pointer; box-shadow: 0 4px 10px rgba(212,175,55,0.3); }
        .btn-secondary { background: #27272a; color: #e4e4e7; border: none; padding: 6px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- الشريط العلوي -->
    <div class="top-bar">
        <div class="brand">Nube<span>Sketch</span></div>
        <div class="top-actions">
            <button class="btn-secondary" id="clear">مسح</button>
            <button class="btn-premium" id="share">نشر ✨</button>
        </div>
    </div>

    <!-- مساحة الرسم -->
    <div class="workspace">
        <canvas id="paintCanvas"></canvas>

        <!-- لوحة اختيار الفرشاة -->
        <div class="panel" id="brushPanel">
            <div class="panel-title">نوع أداة الرسم</div>
            <div class="brush-grid">
                <div class="brush-option selected" data-brush="pen">قلم حبر حاد</div>
                <div class="brush-option" data-brush="brush">فرشاة هوائية ناعمة</div>
                <div class="brush-option" data-brush="hair">فرشاة ملمس الشعر</div>
                <div class="brush-option" data-brush="fabric">نسيج القماش</div>
            </div>
        </div>

        <!-- لوحة الألوان والتحكم في الحجم -->
        <div class="panel" id="colorPanel">
            <div class="panel-title">الألوان والفرشاة</div>
            <div class="color-row">
                <input type="color" id="color" class="native-picker" value="#000000">
                <div class="sliders-container">
                    <div class="slider-group">
                        <span>الحجم</span>
                        <input type="range" id="size" min="1" max="60" value="6">
                    </div>
                    <div class="slider-group">
                        <span>الشفافية</span>
                        <input type="range" id="opacity" min="1" max="100" value="100">
                    </div>
                </div>
            </div>
        </div>

        <!-- شريط التنقل السفلي الاحترافي -->
        <div class="bottom-nav">
            <button class="nav-item active" id="nav-draw" data-main-tool="draw" title="الرسم">🖌️</button>
            <button class="nav-item" id="nav-eraser" data-main-tool="eraser" title="الممحاة">🧽</button>
            <button class="nav-item" id="nav-bucket" data-main-tool="bucket" title="دلو التلوين">🪣</button>
            <button class="nav-item" id="toggle-brush-panel" title="الفرش">🎨</button>
            <button class="nav-item" id="toggle-color-panel" title="الألوان">⚙️</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        
        // ضبط حجم لوحة الرسم لتناسب المساحة بشكل فخم كأنها تابلت رسم
        canvas.width = window.innerWidth - 30;
        canvas.height = window.innerHeight - 160;

        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        let painting = false;
        let currentTool = 'draw'; 
        let currentBrush = 'pen';
        let lastX = 0, lastY = 0;

        // إدارة التبديل بين الأدوات السفلية
        const mainTools = document.querySelectorAll('[data-main-tool]');
        mainTools.forEach(btn => {
            btn.addEventListener('click', () => {
                mainTools.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTool = btn.getAttribute('data-main-tool');
                closeAllPanels();
            });
        });

        // فتح وإغلاق القوائم المنبثقة الفخمة
        function closeAllPanels() {
            document.getElementById('brushPanel').classList.remove('show');
            document.getElementById('colorPanel').classList.remove('show');
        }

        document.getElementById('toggle-brush-panel').addEventListener('click', (e) => {
            e.stopPropagation();
            const p = document.getElementById('brushPanel');
            const state = p.classList.contains('show');
            closeAllPanels();
            if(!state) p.classList.add('show');
        });

        document.getElementById('toggle-color-panel').addEventListener('click', (e) => {
            e.stopPropagation();
            const p = document.getElementById('colorPanel');
            const state = p.classList.contains('show');
            closeAllPanels();
            if(!state) p.classList.add('show');
        });

        document.querySelector('.workspace').addEventListener('click', () => closeAllPanels());

        // خيارات الفرشاة
        const brushOptions = document.querySelectorAll('[data-brush]');
        brushOptions.forEach(opt => {
            opt.addEventListener('click', () => {
                brushOptions.forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected');
                currentBrush = opt.getAttribute('data-brush');
            });
        });

        // تحويل الهكس والألوان المخصصة بالشفافية
        function getDrawColor() {
            const hex = document.getElementById('color').value;
            const opacity = document.getElementById('opacity').value / 100;
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r},${g},${b},${opacity})`;
        }

        // محرك الرسم المتطور والسلس جداً
        function drawEngine(x, y) {
            const size = document.getElementById('size').value;
            ctx.lineWidth = size;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            if (currentTool === 'eraser') {
                ctx.strokeStyle = "#ffffff";
                ctx.shadowBlur = 0;
                ctx.lineTo(x, y);
                ctx.stroke();
            } else if (currentTool === 'draw') {
                ctx.strokeStyle = getDrawColor();
                
                if (currentBrush === 'pen') {
                    ctx.shadowBlur = 0;
                    ctx.lineTo(x, y);
                    ctx.stroke();
                } else if (currentBrush === 'brush') {
                    ctx.shadowBlur = size / 3;
                    ctx.shadowColor = getDrawColor();
                    ctx.lineTo(x, y);
                    ctx.stroke();
                } else if (currentBrush === 'hair') {
                    ctx.shadowBlur = 0;
                    for (let i = -size/2; i < size/2; i += 5) {
                        ctx.beginPath();
                        ctx.moveTo(lastX + i, lastY + i);
                        ctx.lineTo(x + i, y + i);
                        ctx.stroke();
                    }
                } else if (currentBrush === 'fabric') {
                    ctx.shadowBlur = 0;
                    ctx.lineTo(x, y);
                    ctx.stroke();
                    if (Math.random() > 0.4) {
                        ctx.strokeStyle = 'rgba(255,255,255,0.25)';
                        ctx.stroke();
                    }
                }
            }
        }

        // دلو التلوين (Flood Fill) الاحترافي الخفيف والسريع
        function floodFill(startX, startY, fillRGB) {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const targetIdx = (startY * canvas.width + startX) * 4;
            const targetColor = [data[targetIdx], data[targetIdx+1], data[targetIdx+2], data[targetIdx+3]];
            
            if (targetColor[0] === fillRGB[0] && targetColor[1] === fillRGB[1] && targetColor[2] === fillRGB[2]) return;

            const queue = [[startX, startY]];
            while (queue.length > 0) {
                const [x, y] = queue.shift();
                const idx = (y * canvas.width + x) * 4;

                if (data[idx] === targetColor[0] && data[idx+1] === targetColor[1] && data[idx+2] === targetColor[2]) {
                    data[idx] = fillRGB[0]; data[idx+1] = fillRGB[1]; data[idx+2] = fillRGB[2]; data[idx+3] = 255;

                    if (x > 0) queue.push([x - 1, y]);
                    if (x < canvas.width - 1) queue.push([x + 1, y]);
                    if (y > 0) queue.push([x, y - 1]);
                    if (y < canvas.height - 1) queue.push([x, y + 1]);
                }
            }
            ctx.putImageData(imageData, 0, 0);
        }

        // أحداث حركة اللمس والفأرة السلسة جداً (Responsive)
        function startDrawing(e) {
            const pos = getCoordinates(e);
            if (currentTool === 'bucket') {
                const hex = document.getElementById('color').value;
                const rgb = [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
                floodFill(Math.floor(pos.x), Math.floor(pos.y), rgb);
                return;
            }
            painting = true;
            lastX = pos.x; lastY = pos.y;
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
        }

        function stopDrawing() { painting = false; ctx.beginPath(); }
        
        function moveDrawing(e) {
            if (!painting || currentTool === 'bucket') return;
            const pos = getCoordinates(e);
            drawEngine(pos.x, pos.y);
            lastX = pos.x; lastY = pos.y;
        }

        function getCoordinates(e) {
            const rect = canvas.getBoundingClientRect();
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mousemove', moveDrawing);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDrawing(e); });
        canvas.addEventListener('touchend', stopDrawing);
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); moveDrawing(e); });

        document.getElementById('clear').addEventListener('click', () => {
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        });
    </script>
</body>
</html>
